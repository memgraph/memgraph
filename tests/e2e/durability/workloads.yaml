workloads:
  - name: "Durability with property compression used"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/durability_with_property_compression_used.py"]
  - name: "Recover snapshot"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/snapshot_recovery.py"]
  - name: "Recover snapshot (light-edge)"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/snapshot_recovery_light_edge.py"]
  - name: "Periodic snapshot"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/periodic_snapshot.py"]
  - name: "Periodic snapshot (light-edge)"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/periodic_snapshot_light_edge.py"]
  - name: "MT durability"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/multitenancy.py"]
  - name: "Durability with descriptions"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/durability_with_descriptions.py"]
  - name: "Durability with text index"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/durability_with_text_index.py"]
  - name: "Durability with vector index"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/durability_with_vector_index.py"]
  - name: "Indices not persisted in analytical mode"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/indices_not_persisted_analytical.py"]
  - name: "Parameters durability"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["durability/parameters_durability.py"]
