args: &args
  - "--bolt-port"
  - "7687"
  - "--log-level=TRACE"

property_fga_args: &property_fga_args
  - "--bolt-port"
  - "7687"
  - "--log-level=TRACE"
  - "--storage-properties-on-edges=true"
  - "--schema-info-enabled=true"

base_setup_queries: &base_setup_queries
  # Create a role before the first user so builtin role creation (admin/readwrite/readonly) is suppressed.
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "CREATE DATABASE clean;"

edge_type_filtering_setup_queries: &edge_type_filtering_setup_queries
  # Create a role before the first user so builtin role creation (admin/readwrite/readonly) is suppressed.
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "MERGE (l1:label1 {name: 'test1'});"
  - "MERGE (l2:label2 {name: 'test2'});"
  - "MATCH (l1:label1),(l2:label2) WHERE l1.name = 'test1' AND l2.name = 'test2' CREATE (l1)-[r:edgeType1]->(l2);"
  - "MERGE (l3:label3 {name: 'test3'});"
  - "MATCH (l1:label1),(l3:label3) WHERE l1.name = 'test1' AND l3.name = 'test3' CREATE (l1)-[r:edgeType2]->(l3);"
  - "MERGE (mix:label3:label1 {name: 'test4'});"
  - "MATCH (l1:label1),(mix:label3) WHERE l1.name = 'test1' AND mix.name = 'test4' CREATE (l1)-[r:edgeType2]->(mix);"
  - "CREATE DATABASE clean;"
  - "USE DATABASE clean"
  - "MATCH (n) DETACH DELETE n;"
  - "MERGE (l1:label1 {name: 'test1'});"
  - "MERGE (l2:label2 {name: 'test2'});"
  - "MATCH (l1:label1),(l2:label2) WHERE l1.name = 'test1' AND l2.name = 'test2' CREATE (l1)-[r:edgeType1]->(l2);"
  - "MERGE (l3:label3 {name: 'test3'});"
  - "MATCH (l1:label1),(l3:label3) WHERE l1.name = 'test1' AND l3.name = 'test3' CREATE (l1)-[r:edgeType2]->(l3);"
  - "MERGE (mix:label3:label1 {name: 'test4'});"
  - "MATCH (l1:label1),(mix:label3) WHERE l1.name = 'test1' AND mix.name = 'test4' CREATE (l1)-[r:edgeType2]->(mix);"
  - "USE DATABASE memgraph"

path_filtering_setup_queries: &path_filtering_setup_queries
  # Create a role before the first user so builtin role creation (admin/readwrite/readonly) is suppressed.
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user;"
  - "MERGE (a:label0 {id: 0}) MERGE (b:label1 {id: 1}) CREATE (a)-[:edge_type_1 {weight: 6}]->(b);"
  - "MERGE (a:label0 {id: 0}) MERGE (b:label2 {id: 2}) CREATE (a)-[:edge_type_1 {weight: 14}]->(b);"
  - "MERGE (a:label1 {id: 1}) MERGE (b:label2 {id: 2}) CREATE (a)-[:edge_type_2 {weight: 1}]->(b);"
  - "MERGE (a:label2 {id: 2}) MERGE (b:label3 {id: 4}) CREATE (a)-[:edge_type_2 {weight: 10}]->(b);"
  - "MERGE (a:label1 {id: 1}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_3 {weight: 5}]->(b);"
  - "MERGE (a:label2 {id: 2}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_3 {weight: 7}]->(b);"
  - "MERGE (a:label3 {id: 3}) MERGE (b:label3 {id: 4}) CREATE (a)-[:edge_type_4 {weight: 1}]->(b);"
  - "MERGE (a:label3 {id: 4}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_4 {weight: 1}]->(b);"
  - "MERGE (a:label3 {id: 3}) MERGE (b:label4 {id: 5}) CREATE (a)-[:edge_type_4 {weight: 14}]->(b);"
  - "MERGE (a:label3 {id: 4}) MERGE (b:label4 {id: 5}) CREATE (a)-[:edge_type_4 {weight: 8}]->(b);"
  - "CREATE DATABASE clean;"
  - "USE DATABASE clean"
  - "MATCH (n) DETACH DELETE n;"
  - "MERGE (a:label0 {id: 0}) MERGE (b:label1 {id: 1}) CREATE (a)-[:edge_type_1 {weight: 6}]->(b);"
  - "MERGE (a:label0 {id: 0}) MERGE (b:label2 {id: 2}) CREATE (a)-[:edge_type_1 {weight: 14}]->(b);"
  - "MERGE (a:label1 {id: 1}) MERGE (b:label2 {id: 2}) CREATE (a)-[:edge_type_2 {weight: 1}]->(b);"
  - "MERGE (a:label2 {id: 2}) MERGE (b:label3 {id: 4}) CREATE (a)-[:edge_type_2 {weight: 10}]->(b);"
  - "MERGE (a:label1 {id: 1}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_3 {weight: 5}]->(b);"
  - "MERGE (a:label2 {id: 2}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_3 {weight: 7}]->(b);"
  - "MERGE (a:label3 {id: 3}) MERGE (b:label3 {id: 4}) CREATE (a)-[:edge_type_4 {weight: 1}]->(b);"
  - "MERGE (a:label3 {id: 4}) MERGE (b:label3 {id: 3}) CREATE (a)-[:edge_type_4 {weight: 1}]->(b);"
  - "MERGE (a:label3 {id: 3}) MERGE (b:label4 {id: 5}) CREATE (a)-[:edge_type_4 {weight: 14}]->(b);"
  - "MERGE (a:label3 {id: 4}) MERGE (b:label4 {id: 5}) CREATE (a)-[:edge_type_4 {weight: 8}]->(b);"
  - "USE DATABASE memgraph"

show_databases_w_user_setup_queries: &show_databases_w_user_setup_queries
  # Create a role before the first user so builtin role creation (admin/readwrite/readonly) is suppressed.
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "CREATE USER user2 IDENTIFIED BY 'test';"
  - "CREATE USER user3 IDENTIFIED BY 'test';"
  - "CREATE DATABASE db1;"
  - "CREATE DATABASE db2;"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE db1 TO user;"
  - "GRANT ALL PRIVILEGES TO user2;"
  - "GRANT DATABASE db2 TO user2;"
  - "GRANT DATABASE memgraph TO user2;"
  - "REVOKE DATABASE memgraph FROM user2;"
  - "SET MAIN DATABASE db2 FOR user2"
  - "GRANT ALL PRIVILEGES TO user3;"
  - "GRANT DATABASE * TO user3;"
  - "DENY DATABASE memgraph FROM user3;"
  - "SET MAIN DATABASE db1 FOR user3"

property_fga_setup_queries: &property_fga_setup_queries
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO user;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO user;"
  # Test data
  - "CREATE (:Employee {name: 'Alice', ssn: '123-45-6789', salary: 50000});"
  - "CREATE (:Company {name: 'Acme'});"
  - "MATCH (e:Employee {name: 'Alice'}), (c:Company {name: 'Acme'}) CREATE (e)-[:WORKS_AT {start_date: '2020-01-01', secret_code: 'X42'}]->(c);"
  # Path traversal data: Start -> Employee(Alice) -> End
  - "CREATE (:Person {name: 'Start'});"
  - "CREATE (:Person {name: 'End'});"
  - "MATCH (s:Person {name: 'Start'}), (e:Employee {name: 'Alice'}) CREATE (s)-[:KNOWS]->(e);"
  - "MATCH (e:Employee {name: 'Alice'}), (p:Person {name: 'End'}) CREATE (e)-[:KNOWS]->(p);"
  # Property FGA: grant global read, then deny specific properties
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user;"
  - "DENY READ {ssn} ON NODES CONTAINING LABELS :Employee TO user;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user;"
  - "DENY READ {secret_code} ON EDGES OF TYPE :WORKS_AT TO user;"

property_fga_cluster: &property_fga_cluster
  cluster:
    main:
      args: *property_fga_args
      log_file: "fine_grained_access.log"
      setup_queries: *property_fga_setup_queries
      validation_queries: []

# Text-search RBAC fixture — self-contained: users, a title/label graph (no embeddings — text indexes
# only touch string properties), and the text indexes. user (label-restricted + global {*}), user_prop
# (full read + {*}, DENY {title}/{label}), user_grant_only (label only, no property grant → deny-by-
# default), user_prop_deny_cross (DENY {title} :Public only), admin (unrestricted).
text_search_fga_setup_queries: &text_search_fga_setup_queries
  # users
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "CREATE USER user_prop IDENTIFIED BY 'test';"
  - "CREATE USER user_grant_only IDENTIFIED BY 'test';"
  - "CREATE USER user_prop_deny_cross IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT ALL PRIVILEGES TO user_prop;"
  - "GRANT DATABASE * TO user_prop;"
  - "GRANT ALL PRIVILEGES TO user_grant_only;"
  - "GRANT DATABASE * TO user_grant_only;"
  - "GRANT ALL PRIVILEGES TO user_prop_deny_cross;"
  - "GRANT DATABASE * TO user_prop_deny_cross;"
  # user: label-restricted (sees :Public + :LINKS_PUB + :MIXED, DENY :Document + :LINKS_DOC) + global {*}
  - "GRANT READ ON NODES CONTAINING LABELS :Public TO user;"
  - "DENY READ ON NODES CONTAINING LABELS :Document TO user;"
  - "GRANT READ ON EDGES OF TYPE :LINKS_PUB TO user;"
  - "DENY READ ON EDGES OF TYPE :LINKS_DOC TO user;"
  - "GRANT READ ON EDGES OF TYPE :MIXED TO user;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user;"
  # user_prop: full label read + {*}, DENY {title} (the text target) on nodes and {label} on edges
  - "GRANT READ ON NODES CONTAINING LABELS * TO user_prop;"
  - "GRANT READ ON EDGES OF TYPE * TO user_prop;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user_prop;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user_prop;"
  - "DENY READ {title} ON NODES CONTAINING LABELS :Public TO user_prop;"
  - "DENY READ {title} ON NODES CONTAINING LABELS :Document TO user_prop;"
  - "DENY READ {label} ON EDGES OF TYPE :LINKS_PUB TO user_prop;"
  - "DENY READ {label} ON EDGES OF TYPE :LINKS_DOC TO user_prop;"
  # user_grant_only: label read on :Public + :LINKS_PUB, NO property grant (deny-by-default: reads no values)
  - "GRANT READ ON NODES CONTAINING LABELS :Public TO user_grant_only;"
  - "GRANT READ ON EDGES OF TYPE :LINKS_PUB TO user_grant_only;"
  # user_prop_deny_cross: full read + {*}, DENY {title} on :Public only — title readable on pure :Document
  # but denied on the :Public:Document Hybrid (deny wins), for the multi-label per-row drop
  - "GRANT READ ON NODES CONTAINING LABELS * TO user_prop_deny_cross;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user_prop_deny_cross;"
  - "DENY READ {title} ON NODES CONTAINING LABELS :Public TO user_prop_deny_cross;"
  # graph: title on nodes, label on edges; pure Public/Document + a multi-label Hybrid + a MIXED cross-edge
  - "CREATE (:Public {title: 'Welcome'});"
  - "CREATE (:Public {title: 'Hello'});"
  - "CREATE (:Document {title: 'Secret'});"
  - "CREATE (:Document {title: 'Internal'});"
  - "CREATE (:Public:Document {title: 'Hybrid'});"
  - "MATCH (a:Public {title:'Welcome'}), (b:Public {title:'Hello'}) CREATE (a)-[:LINKS_PUB {label:'Open'}]->(b);"
  - "MATCH (a:Document {title:'Secret'}), (b:Document {title:'Internal'}) CREATE (a)-[:LINKS_DOC {label:'Confidential'}]->(b);"
  - "CREATE (p:Public {title:'CrossSrc'}), (d:Document {title:'CrossDst'}) CREATE (p)-[:MIXED {label:'CrossOver'}]->(d);"
  # text indexes: property-less pub/doc + a specified :Document(title) + edge text indexes
  - "CREATE TEXT INDEX pub_text ON :Public;"
  - "CREATE TEXT INDEX doc_text ON :Document;"
  - "CREATE TEXT INDEX doc_title_text ON :Document(title);"
  - "CREATE TEXT EDGE INDEX pub_etext ON :LINKS_PUB;"
  - "CREATE TEXT EDGE INDEX doc_etext ON :LINKS_DOC;"
  - "CREATE TEXT EDGE INDEX mixed_etext ON :MIXED;"

# Vector-search RBAC fixture — self-contained: users, an embedding graph, and the vector indexes.
# Nodes/edges keep title/label alongside embedding because they are the non-indexed properties the
# tests deny (user_prop DENY {title}/{label} → proves a deny on a non-embedding property doesn't block
# vector search) and the identifiers the tests read back. user_prop_deny_indexed DENY {embedding} :Public.
vector_search_fga_setup_queries: &vector_search_fga_setup_queries
  # users
  - "CREATE ROLE _dummy_role;"
  - "CREATE USER admin IDENTIFIED BY 'test';"
  - "CREATE USER user IDENTIFIED BY 'test';"
  - "CREATE USER user_prop IDENTIFIED BY 'test';"
  - "CREATE USER user_grant_only IDENTIFIED BY 'test';"
  - "CREATE USER user_prop_deny_indexed IDENTIFIED BY 'test';"
  - "GRANT ALL PRIVILEGES TO admin;"
  - "GRANT DATABASE * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON NODES CONTAINING LABELS * TO admin;"
  - "GRANT CREATE, READ, UPDATE, DELETE ON EDGES OF TYPE * TO admin;"
  - "GRANT ALL PRIVILEGES TO user;"
  - "GRANT DATABASE * TO user;"
  - "GRANT ALL PRIVILEGES TO user_prop;"
  - "GRANT DATABASE * TO user_prop;"
  - "GRANT ALL PRIVILEGES TO user_grant_only;"
  - "GRANT DATABASE * TO user_grant_only;"
  - "GRANT ALL PRIVILEGES TO user_prop_deny_indexed;"
  - "GRANT DATABASE * TO user_prop_deny_indexed;"
  # user: label-restricted (sees :Public + :LINKS_PUB + :MIXED, DENY :Document + :LINKS_DOC) + global {*}
  - "GRANT READ ON NODES CONTAINING LABELS :Public TO user;"
  - "DENY READ ON NODES CONTAINING LABELS :Document TO user;"
  - "GRANT READ ON EDGES OF TYPE :LINKS_PUB TO user;"
  - "DENY READ ON EDGES OF TYPE :LINKS_DOC TO user;"
  - "GRANT READ ON EDGES OF TYPE :MIXED TO user;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user;"
  # user_prop: full label read + {*}, DENY {title}/{label} — non-embedding properties, so embedding stays readable
  - "GRANT READ ON NODES CONTAINING LABELS * TO user_prop;"
  - "GRANT READ ON EDGES OF TYPE * TO user_prop;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user_prop;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user_prop;"
  - "DENY READ {title} ON NODES CONTAINING LABELS :Public TO user_prop;"
  - "DENY READ {title} ON NODES CONTAINING LABELS :Document TO user_prop;"
  - "DENY READ {label} ON EDGES OF TYPE :LINKS_PUB TO user_prop;"
  - "DENY READ {label} ON EDGES OF TYPE :LINKS_DOC TO user_prop;"
  # user_grant_only: label read on :Public + :LINKS_PUB, NO property grant (deny-by-default: reads no values)
  - "GRANT READ ON NODES CONTAINING LABELS :Public TO user_grant_only;"
  - "GRANT READ ON EDGES OF TYPE :LINKS_PUB TO user_grant_only;"
  # user_prop_deny_indexed: full read + {*}, DENY {embedding} :Public — per-label deny on the indexed
  # property; drops :Public hits on the WILDCARD index
  - "GRANT READ ON NODES CONTAINING LABELS * TO user_prop_deny_indexed;"
  - "GRANT READ ON EDGES OF TYPE * TO user_prop_deny_indexed;"
  - "GRANT READ {*} ON NODES CONTAINING LABELS * TO user_prop_deny_indexed;"
  - "GRANT READ {*} ON EDGES OF TYPE * TO user_prop_deny_indexed;"
  - "DENY READ {embedding} ON NODES CONTAINING LABELS :Public TO user_prop_deny_indexed;"
  # graph: embedding on nodes + edges (title/label retained as the deny targets / identifiers, see above)
  - "CREATE (:Public {title: 'Welcome', embedding: [1.0, 0.0]});"
  - "CREATE (:Public {title: 'Hello', embedding: [0.5, 0.5]});"
  - "CREATE (:Document {title: 'Secret', embedding: [1.0, 0.0]});"
  - "CREATE (:Document {title: 'Internal', embedding: [0.0, 1.0]});"
  - "CREATE (:Public:Document {title: 'Hybrid', embedding: [1.0, 0.0]});"
  - "MATCH (a:Public {title:'Welcome'}), (b:Public {title:'Hello'}) CREATE (a)-[:LINKS_PUB {label:'Open', embedding:[1.0, 0.0]}]->(b);"
  - "MATCH (a:Document {title:'Secret'}), (b:Document {title:'Internal'}) CREATE (a)-[:LINKS_DOC {label:'Confidential', embedding:[1.0, 0.0]}]->(b);"
  - "CREATE (p:Public {title:'CrossSrc', embedding:[1.0, 0.0]}), (d:Document {title:'CrossDst', embedding:[1.0, 0.0]}) CREATE (p)-[:MIXED {label:'CrossOver', embedding:[1.0, 0.0]}]->(d);"
  # vertex + edge vector indexes on (embedding) + a WILDCARD index over any label
  - 'CREATE VECTOR INDEX pub_vec ON :Public(embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'
  - 'CREATE VECTOR INDEX doc_vec ON :Document(embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'
  - 'CREATE VECTOR EDGE INDEX pub_evec ON :LINKS_PUB(embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'
  - 'CREATE VECTOR EDGE INDEX doc_evec ON :LINKS_DOC(embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'
  - 'CREATE VECTOR EDGE INDEX mixed_evec ON :MIXED(embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'
  - 'CREATE VECTOR INDEX wild_vec ON (embedding) WITH CONFIG {"dimension": 2, "capacity": 10};'

