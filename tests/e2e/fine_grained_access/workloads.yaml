workloads:
  - name: "Create delete filtering"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/create_delete_filtering_tests.py"]
    <<: *base_cluster

  - name: "EdgeType filtering"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/edge_type_filtering_tests.py"]
    <<: *edge_type_filtering_cluster

  - name: "Path filtering"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/path_filtering_tests.py"]
    <<: *path_filtering_cluster

  - name: "Property FGA read path"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/property_fga_tests.py"]
    <<: *property_fga_cluster

  - name: "Show databases with users"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/show_db.py"]
    <<: *show_databases_w_user

  - name: "Text search RBAC"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/text_search_fga_tests.py"]
    proc: "query_modules/"
    <<: *text_search_fga_cluster

  - name: "Vector search RBAC"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["fine_grained_access/vector_search_fga_tests.py"]
    proc: "query_modules/"
    <<: *vector_search_fga_cluster
