show_metrics_cluster: &show_metrics_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE"]
      log_file: "show_metrics.log"
      setup_queries: []
      validation_queries: []

show_metrics_json_cluster: &show_metrics_json_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE", "--metrics-port=9091"]
      log_file: "show_metrics_json_values.log"
      setup_queries: []
      validation_queries: []


workloads:
  - name: "Show metrics info"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics.py"]
    <<: *show_metrics_cluster

  - name: "Show metrics JSON values"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_json_values.py"]
    <<: *show_metrics_json_cluster
