show_metrics_cluster: &show_metrics_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE"]
      log_file: "show_metrics.log"
      setup_queries: []
      validation_queries: []

show_metrics_snapshot_cluster: &show_metrics_snapshot_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE", "--storage-snapshot-interval-sec=1"]
      log_file: "show_metrics_snapshot.log"
      setup_queries: []
      validation_queries: []

show_metrics_json_format_cluster: &show_metrics_json_format_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE", "--metrics-port=9091", "--metrics-format=JSON"]
      log_file: "show_metrics_json_format.log"
      setup_queries: []
      validation_queries: []

show_metrics_openmetrics_format_cluster: &show_metrics_openmetrics_format_cluster
  cluster:
    main:
      args: ["--bolt-port", "7687", "--log-level=TRACE", "--metrics-port=9091", "--metrics-format=OpenMetrics"]
      log_file: "show_metrics_openmetrics_format.log"
      setup_queries: []
      validation_queries: []


workloads:
  - name: "Show metrics info"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics.py"]
    <<: *show_metrics_cluster

  - name: "Show metrics info snapshot"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_snapshot.py"]
    <<: *show_metrics_snapshot_cluster

  - name: "Show metrics info recovery"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_recovery.py"]

  - name: "Show metrics JSON format"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_json_format.py"]
    <<: *show_metrics_json_format_cluster

  - name: "Show metrics OpenMetrics format"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_openmetrics_format.py"]
    <<: *show_metrics_openmetrics_format_cluster

  - name: "Show metrics JSON aggregation"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["show_metrics/show_metrics_json_aggregation.py"]
    <<: *show_metrics_json_format_cluster
