bolt_port: &bolt_port "7687"

# Small pool + bounded timeout so the parking-vs-blocking contrast is large. See common.py.
coro_prepare_accessor_yield_on_cluster: &coro_prepare_accessor_yield_on_cluster
  cluster:
    main:
      args:
        [
          "--bolt-port",
          *bolt_port,
          "--log-level=TRACE",
          "--bolt-num-workers=2",
          "--storage-access-timeout-sec=6",
          "--experimental-coro-prepare-accessor-yield=true",
        ]
      log_file: "coro_prepare_accessor_yield.log"
      setup_queries: []
      validation_queries: []

# Control cluster: identical args but the flag is absent (default false).
coro_prepare_accessor_yield_off_cluster: &coro_prepare_accessor_yield_off_cluster
  cluster:
    main:
      args:
        [
          "--bolt-port",
          *bolt_port,
          "--log-level=TRACE",
          "--bolt-num-workers=2",
          "--storage-access-timeout-sec=6",
        ]
      log_file: "coro_prepare_accessor_yield_flag_off_control.log"
      setup_queries: []
      validation_queries: []


workloads:
  - name: "CoroPrepareAccessorYield"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["coro_prepare_accessor_yield/coro_prepare_accessor_yield.py"]
    <<: *coro_prepare_accessor_yield_on_cluster

  - name: "CoroPrepareAccessorYieldFlagOffControl"
    binary: "tests/e2e/pytest_runner.sh"
    args: ["coro_prepare_accessor_yield/coro_prepare_accessor_yield_flag_off_control.py"]
    <<: *coro_prepare_accessor_yield_off_cluster
