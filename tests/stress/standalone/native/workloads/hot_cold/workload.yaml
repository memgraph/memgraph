# Hot/Cold Tenant Concurrency Stress Workload
#
# Hammers the hot/cold 4-state gatekeeper (HOT -> SUSPENDING -> COLD ->
# RESUMING -> HOT) with concurrent writers and manual SUSPEND/RESUME commands.
#
# Two-way contention, plus a DDL-churn thread:
#   1. Writer threads: open per-tenant connections, create labelled nodes in
#      explicit transactions.
#   2. Suspender/Resumer threads: issue SUSPEND DATABASE / RESUME DATABASE on
#      random tenants from the default-db control connection.
#   3. DDL thread: issues CREATE DATABASE / DROP DATABASE [FORCE] / RENAME
#      DATABASE against a disjoint churn_tenant_N pool (never tenant_0..k), so
#      DDL-vs-transition races are exercised without perturbing the fixed
#      tenant set's write/count accounting (reviewer request #15).
#
# NOTE: v2 re-scoped the feature to MANUAL suspend/resume only. All
# auto-eviction machinery was deleted. The flags
# --storage-hot-cold-min-hot-residency-sec, --storage-hot-cold-eviction-enabled,
# --storage-hot-cold-eviction-poll-interval-sec,
# --storage-hot-cold-eviction-high-watermark-percent,
# --storage-hot-cold-eviction-low-watermark-percent, and
# --storage-hot-cold-eviction-max-per-cycle no longer exist and must NOT be
# passed. The feature itself is always on (no flag).
#
# Final integrity check: each worker accumulates a local committed count; after
# the run every tenant is resumed and the on-disk node count must match the
# sum of committed writes. Any mismatch = data loss = non-zero exit.
#
# NOTE: Run this workload against an ASan or TSan build to get sanitizer
# coverage of the suspend/resume machinery. The workload uses bounded retries
# and generous timeouts so it remains correct (no false failures) even under
# the 3-5x slowdown of sanitizer builds.

memgraph:
  deployment:
    externally_managed: false
  args:
    - "--storage-wal-enabled=true"
    - "--storage-snapshot-interval-sec=300"
    - "--data-recovery-on-startup=true"
    - "--memory-limit=512"

general:
  verbose: false
  use_ssl: false

dataset:
  tests: []

customWorkloads:
  tests:
    - name: hot-cold-concurrency-stress
      querying:
        host: "localhost"
        port: 7687
      import:
        queries: []
      script: standalone/native/workloads/hot_cold/workload.py
      script_args:
        - "--endpoint"
        - "127.0.0.1:7687"
        - "--parallelism"
        - "8"
        - "--num-tenants"
        - "6"
        - "--duration-sec"
        - "120"
        - "--nodes-per-tx"
        - "5"
        - "--num-churn-tenants"
        - "4"
      timeout_min: 15
