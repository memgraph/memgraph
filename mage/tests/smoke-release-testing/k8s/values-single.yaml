image:
  repository: docker.io/memgraph/memgraph
  # Overrides the image tag whose default is v{{ .Chart.AppVersion }}
  # It is a bad practice to set the image tag name to latest as it can trigger automatic upgrade of the charts
  # With some of the pullPolicy values. Please consider fixing the tag to a specific Memgraph version
  tag: 3.10.1
  pullPolicy: IfNotPresent

## Override the default imagePullSecrets
useImagePullSecrets: false
imagePullSecrets:
- name: regcred

replicaCount: 1

# Configures the `spec.affinity.nodeAffinity` field of the Memgraph Pod
nodeAffinity: {}
# See https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/ for more information
# Example config:
#  requiredDuringSchedulingIgnoredDuringExecution:
#    nodeSelectorTerms:
#      - matchExpressions:
#          - key: topology.kubernetes.io/zone
#            operator: In
#            values:
#              - antarctica-east1
#              - antarctica-west1
#    preferredDuringSchedulingIgnoredDuringExecution:
#      - weight: 1
#        preference:
#          matchExpressions:
#            - key: my-organization/node-performance
#              operator: In
#              values:
#                - best

# Priority indicates the importance of a Pod relative to other Pods.
# More Information: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
priorityClassName: null

nodeSelector: {}

tolerations: []

service:
  ## ClusterIP, NodePort, LoadBalancer
  # ClusterIP keep the service inside the cluster makes it secure
  # NodePort would create a external port change port: between 30000-32767 accessible to all the nodes and Public IPs if not in a VPC
  # LoadBalancer is compabile with Cloud Providers on port: 80 without SSL redirected to the 7687
  type: ClusterIP

  # Bolt Port
  enableBolt: true
  boltPort: 7687  # NOTE: Make sure to change port in probes if you change this value.

  # Websocket Monitoring
  enableWebsocketMonitoring: false
  websocketPortMonitoring: 7444

  # HTTP Monitoring
  enableHttpMonitoring: false
  httpPortMonitoring: 9091

  annotations: {}
  labels: {}
  # Creates an additional Service for applications outside the Kubernetes cluster that need access to Memgraph.
  # Uses the same ports as configured for the main Service
  loadBalancer:
    enabled: false

    type: LoadBalancer

    # Bolt Port
    enableBolt: true

    # Websocket Monitoring
    enableWebsocketMonitoring: false

    # HTTP Monitoring
    enableHttpMonitoring: false

    annotations: {}
    labels: {}

    # Additional configuration
    externalTrafficPolicy: null
    ipFamilyPolicy: null
    ipFamilies: null
    # If specified and supported by the platform, this will restrict traffic through the cloud-provider load-balancer will be restricted to the specified client IPs.
    # This field will be ignored if the cloud-provider does not support the feature.
    # More info: https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/
    loadBalancerSourceRanges: null
    # Example value:
    # - 1.2.3.4/32
    # - 8.8.8.0/28

persistentVolumeClaim:
  ## createStoragePVC `true` will create for each statefulset server a Persistant Volume Claim
  ## `false` will let you choose an existing Persistant Volume Claim or will create one with an existing volume
  createStorageClaim: true
  ## Using a Storage Class Name with policy `retain` will keep the Persistant Volume Claim and the Volume until you manually delete it
  ## If you use a Storage Class Name with policy `delete` the Persistant Volume Claim and Volume will be deleted when the helm release is deleted
  storageClassName:
  ## Storage Size must me at minimum 4x the maximum size of your Dataset for Snapshots
  ## See documentation for choosing the right size depending on the number of Snapshots you want to keep
  ## Default is 3 snapshots and you need space to create a new one and WAL files
  storageSize: 10Gi
  # Volume claim access mode
  libStorageAccessMode: "ReadWriteOnce"
  ## if `createStoragePVC` is `false` you can choose to use an existing Persistant Volume Claim
  ## Write the name and exising Persistant Volume Claim
  existingClaim: memgraph-0
  ## If you want to create a Persistant Volume Claim for an existing Volume
  storageVolumeName:

  ## Create a Persistant Volume Claim for Logs, if you use a Storage Class Name with policy `retain` the logs will be kept until you manually delete them
  # `false` will only write logs to stdout / stderr
  createLogStorage: true
  logStorageClassName:
  logStorageSize: 1Gi

  ## Create a Dynamic Persistant Volume Claim for Configs, Certificates (e.g. Bolt cert ) and rest of User related files
  createUserClaim: false
  userStorageClassName:
  userStorageSize: 1Gi
  userStorageAccessMode: "ReadWriteOnce"
  userMountPath:

  ## Create a Persistant Volume Claim for Core Dumps.
  createCoreDumpsClaim: true
  coreDumpsStorageClassName:
  coreDumpsStorageSize: 10Gi
  coreDumpsMountPath: /var/core/memgraph

# Default Storage Class for data and logs, defaults are for Minikube, make sure to change it for production deployments
# Examples provisioner: Minikube(k8s.io/minikube-hostpath) AWS (ebs.csi.aws.com), GCP (pd.csi.storage.gke.io), Azure (disk.csi.azure.com)
# Examples storageType: Minikube(hostPath) AWS (gp2), GCP (pd-standard), Azure (StandardSSD_LRS)

storageClass:
  create: false
  name: memgraph-generic-storage-class
  provisioner: "k8s.io/minikube-hostpath"
  storageType: "hostPath"
  fsType: ext4
  reclaimPolicy: Retain
  volumeBindingMode: Immediate

memgraphConfig:
# If setting the --memory-limit flag, check that the amount of resources that a pod has been given is more than the actual memory limit you give to Memgraph
# Setting the Memgraph's memory limit to more than the available resources can trigger pod eviction and restarts before Memgraph can make a query exception and continue running
# the pod. For further information, check the `resources` section in this file about setting pod memory and cpu limits.
# If vectorRemote.enabled=true, add the following flags to memgraphConfig:
# - "--monitoring-port=<service.websocketPortMonitoring>"
# - "--monitoring-address=0.0.0.0"
- "--data-directory=/var/lib/memgraph/mg_data"
- "--also-log-to-stderr=true"
- "--telemetry-enabled=false"

# This is fine because under both
# Memgraph and Mage images we actually hard-code the user and group id.
memgraphUserId: 101
memgraphGroupId: 103

secrets:
  enabled: false
  name: memgraph-secrets
  userKey: USER
  passwordKey: PASSWORD

## Memgraph Enterprise Licence
# memgraphEnterpriseLicense: "<your-license>"
# memgraphOrganizationName: "<your-organization-name>"

memgraphEnterpriseLicense:
memgraphOrganizationName:

# Annotations to add to the statefulSet
statefulSetAnnotations: {}
# Annotations to add to the Pod
podAnnotations: {}

extraEnv: []
# Example:
# extraEnv:
#   - name: CUSTOM_FEATURE_FLAG
#     value: "true"
#   - name: API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: api-key

resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

serviceAccount:
  # Specifies whether a service account should be created
  # If set to false and the name is provided, this service account must exist
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

container:
  terminationGracePeriodSeconds: 1800
  # When a container is ready to be used. Disabled until startupProbe succeeds.
  readinessProbe:
    # Defining exec.command overrides tcpSocket.
    # exec:
    #   command: ["/bin/sh", "-c", "echo 'RETURN 0;' | mgconsole"]
    tcpSocket:
      port: 7687
    failureThreshold: 20
    timeoutSeconds: 10
    periodSeconds: 5
    initialDelaySeconds: 0
  # To know when a container needs to be restarted.
  # Disabled until startupProbe succeeds.
  livenessProbe:
    tcpSocket:
      port: 7687
    failureThreshold: 20
    timeoutSeconds: 10
    periodSeconds: 5
    initialDelaySeconds: 0
  # When restoring Memgraph from a backup, it is important to give enough time app to start. Here, we set it to 2h by default.
  startupProbe:
    tcpSocket:
      port: 7687
    failureThreshold: 1440
    timeoutSeconds: 1
    periodSeconds: 5
    initialDelaySeconds: 0

# List of custom query modules to be mounted into the app.
# These will be loaded automatically, on startup.
# Each module must be exposed by a ConfigMap under a specific file name.
customQueryModules: []

#   Must be an existing ConfigMap
# - volume: ""
#   Must be present in the ConfigMap referenced with `volume`
#   file: ""

## @param lifecycleHooks For the memgraph container(s) to automate configuration before or after startup
## ref: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/#container-hooks
## e.g.:
## lifecycleHooks:
##   preStop:
##     exec:
##       command: ["/scripts/pre-stop.sh"]
lifecycleHooks: {}

## @param extraVolumes Optionally specify extra list of additional volumes (supports Helm templating)
## e.g.:
## extraVolumes:
## - name: scripts
##   configMap:
##     name: scripts
##     defaultMode: 0755
extraVolumes: []

## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts
## e.g.:
## extraVolumeMounts:
## - name: scripts
##   mountPath: /scripts
##   readOnly: true
extraVolumeMounts: []


# If you are experiencing issues with the sysctlInitContainer, you can disable it here.
# This is made to increase the max_map_count, necessary for high memory loads in Memgraph
# If you are experiencing crashing pod with the: Max virtual memory areas vm.max_map_count is too low
# you can increase the maxMapCount value.
# You can see what's the proper value for this parameter by reading
# https://memgraph.com/docs/database-management/system-configuration#recommended-values-for-the-vmmax_map_count-parameter
sysctlInitContainer:
  enabled: true
  maxMapCount: 524288
  image:
    repository: docker.io/library/busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent

## @param initContainers Add additional init containers to the Memgraph pod(s)
## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
## e.g:
## initContainers:
##  - name: your-image-name
##    image: your-image
##    imagePullPolicy: Always
##    command: ['sh', '-c', 'echo "hello world"']
##
initContainers: []

prometheus:
  enabled: false
  namespace: monitoring  # Namespace where K8s resources from mg-exporter.yaml will be installed and where your kube-prometheus-stack chart is installed, can be left empty to use release namespace.
  memgraphExporter:
    port: 9115
    pullFrequencySeconds: 5
    repository: docker.io/memgraph/prometheus-exporter
    tag: 0.2.3
  serviceMonitor:
    enabled: true
    kubePrometheusStackReleaseName: kube-prometheus-stack
    interval: 15s

## Optional: vmagent for remote monitoring cluster – scrapes the Prometheus exporter
## (and optionally kube-state-metrics / node-exporter / kubelet when vmagentRemote.kubernetes.enabled=true)
## and remote-writes to VictoriaMetrics (or any Prometheus remote-write endpoint).
## Requires prometheus.enabled so that mg-exporter is deployed. Enable service.enableHttpMonitoring on Memgraph for exporter to read metrics.
## If vmagentRemote.enabled=true and you only need remote_write, set prometheus.serviceMonitor.enabled=false
## to avoid duplicate scraping of mg-exporter by both vmagent and kube-prometheus.
vmagentRemote:
  enabled: false
  namespace: ""  # Defaults to prometheus.namespace when empty
  image:
    repository: victoriametrics/vmagent
    tag: v1.139.0
    pullPolicy: IfNotPresent
  remoteWrite:
    url: ""  # e.g. http://vmsingle.monitoring.svc.cluster.local:8428/api/v1/write
    basicAuth:
      secretName: ""  # Secret with username and password keys
      usernameKey: username
      passwordKey: password
  scrapeInterval: 15s
  externalLabels: {}  # e.g. cluster_id: "my-cluster", service_name: "memgraph", cluster_env: "prod"
  kubernetes:
    enabled: false  # Enable scraping of Kubernetes infrastructure metrics used by kube-prometheus dashboards.
    kubeStateMetrics:
      enabled: true
      jobName: kube-state-metrics
      targets:
        - kube-prometheus-stack-kube-state-metrics.monitoring.svc.cluster.local:8080
    nodeExporter:
      enabled: true
      jobName: node-exporter
      # When enabled, scrape node-exporter pods via Kubernetes discovery so
      # namespace/pod/node labels are present for kube-prometheus recording rules.
      useKubernetesDiscovery: false
      podMetricsPort: "9100"
      appNameLabel: prometheus-node-exporter
      appInstanceLabel: kube-prometheus-stack-prometheus-node-exporter
      targets:
        - kube-prometheus-stack-prometheus-node-exporter.monitoring.svc.cluster.local:9100
    kubelet:
      enabled: true
      jobName: kubelet
      # Scrape kubelet cAdvisor metrics via Kubernetes API server node proxy.
      metricsPath: /metrics/cadvisor
      # Also scrape kubelet /metrics
      additionalMetricsEnabled: true
      additionalJobName: kubelet-metrics
      additionalMetricsPath: /metrics
      apiServerAddress: kubernetes.default.svc:443
      # Set to true only if your cluster uses an untrusted kube-apiserver serving cert chain.
      insecureSkipVerify: false
  resources: {}
  httpPort: 8429  # vmagent local HTTP listen port (metrics/debug); remote write target is remoteWrite.url

## Optional: Vector sidecar for remote monitoring cluster – exports Memgraph logs via websocket to VictoriaLogs (Loki-compatible API) or any Loki endpoint.
## Requires Memgraph monitoring websocket/logs on the configured port.
## Add --monitoring-port=<service.websocketPortMonitoring> and --monitoring-address=0.0.0.0 to memgraphConfig when vectorRemote.enabled=true.
## If you override memgraphConfig or service.websocketPortMonitoring, keep those values aligned.
## Exposing that port via service.enableWebsocketMonitoring is optional because Vector connects directly to the pod IP.
vectorRemote:
  enabled: false
  image:
    repository: timberio/vector
    tag: 0.49.0-debian
    pullPolicy: IfNotPresent
  logsEndpoint: ""  # e.g. http://victoria-logs.monitoring.svc.cluster.local:9428/insert
  auth:
    secretName: ""  # Secret with username and password for logs endpoint basic auth
    usernameKey: username
    passwordKey: password
  extraLabels: {}  # e.g. cluster_id: "my-cluster", service_name: "memgraph", cluster_env: "prod", role: "standalone"
  resources: {}
