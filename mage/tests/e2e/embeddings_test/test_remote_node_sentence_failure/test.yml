query: >
    WITH {
      model_name: "ollama/nomic-embed-text",
      api_base: "http://127.0.0.1:1",
      num_retries: 0,
      timeout: 2
    } AS configuration
    CALL embeddings.node_sentence(NULL, configuration)
    YIELD success
    WITH success
    MATCH (n:Doc)
    RETURN success, n.embedding IS NULL AS no_embedding_written;

output:
    - success: false
      no_embedding_written: true
