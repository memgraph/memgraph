# A node deleted earlier in the caller's transaction, passed as a parameter, matches nothing under
# identity comparison (it is no longer among the live nodes) — the nested query returns no rows.
query: >
    MATCH (a:Person {name: "Alice"})
    DETACH DELETE a
    WITH a
    MATCH (b:Person {name: "Bob"})
    CALL cypher.doIt("MATCH (m) WHERE m = $n RETURN m.name AS name", {n: a})
    YIELD value
    RETURN value.name AS name;

output: []
