# Raise the core-dump size limit (ulimit -c) in every build container so a
# Memgraph that crashes during a CI test actually writes a core into
# /tmp/mg-cores for collection. Equivalent to `docker run --ulimit core=-1`;
# without it the in-container soft limit is 0 and no core is produced. The
# host's kernel.core_pattern (pointing at /tmp/mg-cores) is configured
# out-of-band on the runners.
x-mgbuild-ulimits: &mgbuild-ulimits
  core:
    soft: -1
    hard: -1

services:
  # NOTE: build > context > args are injected via mgbuild.sh script.

  mgbuild_v7_debian-12-arm:
    image: "memgraph/mgbuild:v7_debian-12-arm"
    build:
      context: debian-12-arm
      args:
        TOOLCHAIN_VERSION: "v7"
    extra_hosts:
      - "bench-graph-api:100.124.112.121"
    ulimits: *mgbuild-ulimits
    container_name: "mgbuild_v7_debian-12-arm"

  mgbuild_v7_debian-13-arm:
    image: "memgraph/mgbuild:v7_debian-13-arm"
    build:
      context: debian-13-arm
      args:
        TOOLCHAIN_VERSION: "v7"
    extra_hosts:
      - "bench-graph-api:100.124.112.121"
    ulimits: *mgbuild-ulimits
    container_name: "mgbuild_v7_debian-13-arm"

  mgbuild_v7_ubuntu-24.04-arm:
    image: "memgraph/mgbuild:v7_ubuntu-24.04-arm"
    build:
      context: ubuntu-24.04-arm
      args:
        TOOLCHAIN_VERSION: "v7"
    extra_hosts:
      - "bench-graph-api:100.124.112.121"
    ulimits: *mgbuild-ulimits
    container_name: "mgbuild_v7_ubuntu-24.04-arm"

  mgbuild_v7_fedora-42-arm:
    image: "memgraph/mgbuild:v7_fedora-42-arm"
    build:
      context: fedora-42-arm
      args:
        TOOLCHAIN_VERSION: "v7"
    extra_hosts:
      - "bench-graph-api:100.124.112.121"
    ulimits: *mgbuild-ulimits
    container_name: "mgbuild_v7_fedora-42-arm"
