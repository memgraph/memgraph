name: Reusable package make and upload

on:
  workflow_call:
    inputs:
      os:
        type: string
        description: "Target os. Default value is ubuntu-24.04."
        default: ubuntu-24.04
      arch:
        type: string
        description: "Target architecture. Default value is amd."
        default: amd
      build_type:
        type: string
        description: "Memgraph Build type. Default value is Release."
        default: Release
      split_debug:
        type: boolean
        description: "Extract debug info into sidecar .debug files (requires RelWithDebInfo or Debug build type)."
        default: false
      package_flavour:
        type: string
        description: "Package flavour: 'prod' (stripped binary, symbols archived separately), 'debug' ('-relwithdebinfo' suffix, ships memgraph-debuginfo deb beside main), or 'both' (docker only — produces prod + debug images from a single build). Debug and both require build_type=RelWithDebInfo."
        default: prod
      additional_build_args:
        type: string
        description: "Additional build flags (--for-docker ...). Default value is empty."
        default: ''
      push_to_github:
        type: string
        description: "Should the final package be pushed to GitHub. Default value is false."
        default: false
      push_to_s3:
        type: string
        description: "Should the final package be pushed to an S3 bucket. Default value is false."
        default: false
      s3_bucket:
        type: string
        description: "Name of the target S3 bucket."
        default: ''
      s3_region:
        type: string
        description: "Region for the target S3 bucket."
        default: eu-west-1
      s3_dest_dir:
        type: string
        description: "Target dir path in S3 bucket."
        default: ''
      ref:
        type: string
        description: "Git ref to checkout. Default value is the current ref."
        default: ''
      generate_sbom:
        type: boolean
        description: "Generate SBOM"
        default: false
      run_smoke_tests:
        type: boolean
        description: "Run smoke tests on images after building (tests against previous tagged image)"
        default: false
    outputs:
      package_s3_url:
        description: "The URL of the package in the S3 bucket."
        value: ${{ jobs.PackageAndUpload.outputs.package_s3_url }}

env:
  TOOLCHAIN: v7
  GENERATE_SBOM: ${{ inputs.generate_sbom }}
  ARCH: ${{ inputs.arch }}
  BUILD_TYPE: ${{ inputs.build_type }}
  SPLIT_DEBUG: ${{ inputs.split_debug }}
  PACKAGE_FLAVOUR: ${{ inputs.package_flavour }}
  OS: ${{ inputs.os }}
  ADDITIONAL_BUILD_ARGS: ${{ inputs.additional_build_args }}
  PUSH_TO_GITHUB: ${{ inputs.push_to_github }}
  PUSH_TO_S3: ${{ inputs.push_to_s3 }}
  S3_BUCKET: ${{ inputs.s3_bucket }}
  S3_REGION: ${{ inputs.s3_region }}
  S3_DEST_DIR: ${{ inputs.s3_dest_dir }}
  REF: ${{ inputs.ref }}
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}

jobs:
  PackageAndUpload:
    runs-on: ${{ (inputs.arch == 'arm') && fromJSON('["self-hosted", "DockerMgBuild", "ARM64"]') || fromJSON((inputs.os == 'centos-10' || inputs.os == 'rocky-10') && '["self-hosted", "DockerMgBuild", "X64", "x86-64-v3"]' || '["self-hosted", "DockerMgBuild", "X64"]') }}
    timeout-minutes: 30
    outputs:
      package_s3_url: ${{ steps.output_package_s3_url.outputs.package_s3_url }}
    steps:
      - name: "Validate S3 dest dir for official package"
        if: ${{ inputs.push_to_s3 == 'true' && inputs.s3_bucket == 'download.memgraph.com' }}
        run: |
          # Only the prod flavour (stripped binary, symbols archived externally)
          # belongs on the customer download site. The debug flavour goes to
          # deps/internal, and 'both' includes the debug image so it's also
          # rejected — push prod+debug to the internal bucket instead.
          if [[ "$PACKAGE_FLAVOUR" == 'debug' || "$PACKAGE_FLAVOUR" == 'both' ]]; then
            echo -e "Error: You are pushing a '$PACKAGE_FLAVOUR'-flavour package to 'download.memgraph.com'."
            exit 1
          fi
          if ! [[ "$S3_DEST_DIR" =~ memgraph/v[0-9]\.[0-9]+\.[0-9]+$ ]]; then
            echo -e "Error: $S3_DEST_DIR is not a valid official format. When pushing to 'download.memgraph.com' the dest dir has to match format 'memgraph/vX.Y.Z'!"
            exit 1
          fi
          echo -e "Passed: Dest dir $S3_DEST_DIR has a valid official format."

      - name: "Set up repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0 # Required because of release/get_version.py
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: "Log in to Docker Hub"
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Set artifact name and dir"
        run: |
          artifact_name="$OS"
          artifact_dir='build/output'
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--for-docker"* ]]; then
            artifact_name='docker'
            echo "FOR_DOCKER=true" >> $GITHUB_ENV
            echo "DOCKER_ARTIFACT_DIR=${artifact_dir}/docker" >> $GITHUB_ENV
          fi
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            artifact_name="${artifact_name}-malloc"
          fi
          if [[ "$ARCH" == 'arm' ]]; then
            artifact_name="${artifact_name}-aarch64"
          fi
          # For 'both', the docker artifact dir holds both prod and debug
          # archives, so we leave the artifact name without -relwithdebinfo —
          # the per-image suffix lives in the file basenames, not the dir.
          if [[ "$BUILD_TYPE" == 'RelWithDebInfo' && "$PACKAGE_FLAVOUR" == 'debug' ]]; then
            artifact_name="${artifact_name}-relwithdebinfo"
          fi
          echo "ARTIFACT_NAME=$artifact_name" >> $GITHUB_ENV
          echo "PACKAGE_ARTIFACT_DIR=${artifact_dir}/package" >> $GITHUB_ENV

      - name: "Validate package_flavour"
        run: |
          # 'both' produces prod + debug docker images from a single build.
          # It only makes sense in the FOR_DOCKER branch (the deb path produces
          # one main + one debuginfo package and has no concept of two outputs).
          if [[ "$PACKAGE_FLAVOUR" == "both" ]]; then
            if [[ "$FOR_DOCKER" != "true" ]]; then
              echo "Error: package_flavour=both is only valid when building docker (--for-docker in additional_build_args)" >&2
              exit 1
            fi
            if [[ "$BUILD_TYPE" != "RelWithDebInfo" ]]; then
              echo "Error: package_flavour=both requires build_type=RelWithDebInfo (got '$BUILD_TYPE')" >&2
              exit 1
            fi
            # 'both' needs the debuginfo deb produced from the single build, so
            # force split-debug on regardless of what the caller passed.
            echo "SPLIT_DEBUG=true" >> $GITHUB_ENV
          fi

      - name: Set Additional Build Args
        run: |
          if [[ -z "$ADDITIONAL_BUILD_ARGS" ]]; then
            args="--disable-testing"
          else
            args="$ADDITIONAL_BUILD_ARGS --disable-testing"
          fi
          echo "ADDITIONAL_BUILD_ARGS=$args" >> $GITHUB_ENV
          echo "Final build args: $args"

      - name: "Spin up mgbuild container"
        run: |
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: "Build Memgraph binaries"
        run: |
          # $SPLIT_DEBUG may have been forced on in the Validate step (e.g. for
          # package_flavour=both, which needs the debuginfo deb).
          SPLIT_DEBUG_ARG=""
          if [[ "$SPLIT_DEBUG" == "true" ]]; then
            SPLIT_DEBUG_ARG="--split-debug"
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          build-memgraph $ADDITIONAL_BUILD_ARGS $SPLIT_DEBUG_ARG \
          --conan-remote $CONAN_REMOTE \
          --conan-username $CONAN_USERNAME \
          --conan-password $CONAN_PASSWORD

      - name: "Make package"
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-memgraph

      - name: "Copy package"
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy \
          --package \
          --dest-dir $PACKAGE_ARTIFACT_DIR

      - name: "Upload debug symbols"
        # Use $SPLIT_DEBUG (env) rather than inputs.split_debug so the override
        # from the Validate step (e.g. for package_flavour=both) is honoured.
        if: ${{ env.SPLIT_DEBUG == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy-debug-symbols \
          --dest-dir build/debug-symbols
          bash tools/ci/upload-debug-symbols.sh build/debug-symbols

      - name: "Copy SBOM"
        if: ${{ env.GENERATE_SBOM == 'true' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy \
          --sbom

      - name: "Build gssapi wheel for smoke image"
        if: ${{ env.FOR_DOCKER != 'true' && inputs.run_smoke_tests }}
        run: |
          # gssapi has no prebuilt linux wheels on PyPI, so build one inside
          # the MGBUILD container (which has libkrb5/krb5-devel available) and
          # drop it into a local wheels dir that the smoke image build will
          # pip-install from via --find-links.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-gssapi \
            --dest-dir build/output/smoke-wheels

      - name: "Build smoke image from package"
        if: ${{ env.FOR_DOCKER != 'true' && inputs.run_smoke_tests }}
        run: |
          image_tag="smoke-${OS}-${ARCH}-${BUILD_TYPE}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            package-smoke-image \
            --src-dir $PACKAGE_ARTIFACT_DIR \
            --image-tag "$image_tag" \
            --wheels-dir build/output/smoke-wheels
          echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
          echo "Resolved IMAGE_TAG=$image_tag"

      - name: "Build heaptrack"
        # Heaptrack ships only in the debug docker image, so build it for
        # 'debug' and also for 'both' (which produces the debug image too).
        if: ${{ inputs.build_type == 'RelWithDebInfo' && (inputs.package_flavour == 'debug' || inputs.package_flavour == 'both') && env.FOR_DOCKER == 'true' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          build-heaptrack

      - name: "Copy heaptrack"
        if: ${{ inputs.build_type == 'RelWithDebInfo' && (inputs.package_flavour == 'debug' || inputs.package_flavour == 'both') && env.FOR_DOCKER == 'true' }}
        run: |
          mkdir -p release/docker
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy-heaptrack \
          --dest-dir "$(pwd)/release/docker"

      - name: "Build OpenSSL"
        if: ${{ env.FOR_DOCKER == 'true' }}
        run: |
          # This step is necessary so that we can build custom packages of OpenSSL and libssl3 for
          # the Docker images. These packages will be installed by apt, and as long as the remote
          # version provided by Ubuntu is less than our version, our package will not be overwritten.
          # This means that anything within the container that depends on OpenSSL should use our
          # version.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-ssl \
            --version "3.5.4" \
            --conan-remote $CONAN_REMOTE \
            --conan-username $CONAN_USERNAME \
            --conan-password $CONAN_PASSWORD

      - name: "Build gssapi wheel"
        if: ${{ env.FOR_DOCKER == 'true' }}
        run: |
          # gssapi has no prebuilt linux wheels on PyPI, so build one in the
          # MGBUILD container (which has libkrb5/krb5-devel) and drop it into
          # release/docker/wheels so the python-base Dockerfile stage can
          # install it from the local wheel rather than hitting PyPI.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-gssapi \
            --dest-dir release/docker/wheels

      - name: "Stop mgbuild container"
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          stop --remove

      # The docker image creation is split into two steps — one per flavour —
      # so package_flavour=both can produce prod + debug images sequentially
      # from a single build. Both images share the same memgraph_*.deb; the
      # debug image additionally installs memgraph-debuginfo_*.deb on top.
      - name: "Create docker image (prod)"
        if: ${{ env.FOR_DOCKER == 'true' && (inputs.package_flavour == 'prod' || inputs.package_flavour == 'both') }}
        run: |
          malloc=false
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            malloc=true
          fi
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-docker \
          --src-dir $PACKAGE_ARTIFACT_DIR \
          --dest-dir $DOCKER_ARTIFACT_DIR \
          --generate-sbom $GENERATE_SBOM \
          --malloc $malloc \
          --custom-mirror $USE_CUSTOM_MIRROR \
          --package-flavour prod \
          --keep-image-loaded ${{ inputs.run_smoke_tests }}
          # Pick the prod archive specifically — when flavour=both the debug
          # step (below) will produce a sibling -relwithdebinfo archive in the
          # same dir, and we want IMAGE_TAG to refer to the prod image so the
          # bolt smoke test runs against it.
          image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-docker.tar.gz 2>/dev/null | grep -v -- '-relwithdebinfo-docker.tar.gz$' | head -n 1)"
          if [[ -z "$image_archive" ]]; then
            echo "Error: Could not find prod docker image archive in '$DOCKER_ARTIFACT_DIR'."
            exit 1
          fi
          image_tag="$(basename "$image_archive")"
          image_tag="${image_tag#memgraph-}"
          image_tag="${image_tag%-docker.tar.gz}"
          echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
          echo "Resolved IMAGE_TAG=$image_tag"

      - name: "Create docker image (debug)"
        if: ${{ env.FOR_DOCKER == 'true' && (inputs.package_flavour == 'debug' || inputs.package_flavour == 'both') }}
        run: |
          malloc=false
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            malloc=true
          fi
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          # When flavour=both the prod step above already kept the prod image
          # loaded for smoke tests; the debug image doesn't need to be loaded
          # (smoke tests use prod since both share the same memgraph binary).
          if [[ "$PACKAGE_FLAVOUR" == "both" ]]; then
            keep_loaded=false
          else
            keep_loaded=${{ inputs.run_smoke_tests }}
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-docker \
          --src-dir $PACKAGE_ARTIFACT_DIR \
          --dest-dir $DOCKER_ARTIFACT_DIR \
          --generate-sbom $GENERATE_SBOM \
          --malloc $malloc \
          --custom-mirror $USE_CUSTOM_MIRROR \
          --package-flavour debug \
          --keep-image-loaded "$keep_loaded"
          # Only set IMAGE_TAG when the debug step is the sole producer
          # (flavour=debug). For flavour=both, IMAGE_TAG was set by the prod
          # step and the bolt smoke test targets that prod image.
          if [[ "$PACKAGE_FLAVOUR" == "debug" ]]; then
            image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-relwithdebinfo-docker.tar.gz 2>/dev/null | head -n 1)"
            if [[ -z "$image_archive" ]]; then
              echo "Error: Could not find debug docker image archive in '$DOCKER_ARTIFACT_DIR'."
              exit 1
            fi
            image_tag="$(basename "$image_archive")"
            image_tag="${image_tag#memgraph-}"
            image_tag="${image_tag%-docker.tar.gz}"
            echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
            echo "Resolved IMAGE_TAG=$image_tag"
          fi

      - name: "Bolt smoke test (no-arg startup)"
        if: ${{ env.FOR_DOCKER == 'true' }}
        run: |
          image="memgraph/memgraph:${IMAGE_TAG}"
          # --keep-image-loaded is only true when run_smoke_tests is set, so
          # load from the tarball when needed.
          if ! docker image inspect "$image" >/dev/null 2>&1; then
            image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-docker.tar.gz 2>/dev/null | head -n 1)"
            docker load -i "$image_archive"
          fi
          ./tools/ci/smoke_test_docker_image.sh "$image"

      - name: "Generate Build SBOM"
        if: ${{ env.GENERATE_SBOM == 'true'  && env.FOR_DOCKER != 'true' }}
        run: |
          ./tools/ci/sbom/build-sbom.sh

      - name: "Upload SBOM Files"
        if: ${{ env.GENERATE_SBOM == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: memgraph-sbom
          path: sbom/

      - name: "Upload SBOM to S3"
        if: ${{ env.GENERATE_SBOM == 'true' && inputs.push_to_s3 == 'true' && startsWith(inputs.ref, 'v') && contains(inputs.ref, '-rc') }}
        run: |
          aws s3 sync sbom/ "s3://${S3_BUCKET}/${S3_DEST_DIR}/sbom/"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.s3_region }}

      - name: Run smoke tests
        if: ${{ inputs.run_smoke_tests }}
        env:
          MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
          MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
        run: |
          # Test against the latest release version
          last_version="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          last_version="${last_version#v}"
          if [[ "$BUILD_TYPE" == "RelWithDebInfo" && "$PACKAGE_FLAVOUR" == "debug" ]]; then
            last_version="${last_version}-relwithdebinfo"
          fi
          echo "Resolved LAST_VERSION=$last_version"
          docker pull "memgraph/memgraph:${last_version}"

          export MEMGRAPH_NEXT_DOCKERHUB_IMAGE="memgraph/memgraph:${IMAGE_TAG}"
          export MEMGRAPH_LAST_DOCKERHUB_IMAGE="memgraph/memgraph:${last_version}"

          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
            --organization-name $MEMGRAPH_ORGANIZATION_NAME \
            test-memgraph smoke \
            --next-image $MEMGRAPH_NEXT_DOCKERHUB_IMAGE \
            --last-image $MEMGRAPH_LAST_DOCKERHUB_IMAGE

      - name: "Rename Package"
        if: github.ref == 'refs/heads/master' && !inputs.ref
        run: |
          # during testing, we will keep the default naming because it uses the
          # previous tag + number of commits since and the current commit hash
          # if on master, then store the latest PR number and the commit

          # get the latest tagged version
          tag="$(tools/ci/get_latest_tag.sh)"

          # fetch the most recent PR number from git log
          pr="$(git log --pretty=%B | grep -oP '(?<=\(#)\d+(?=\))' | head -n 1)"

          # use the short commit hash
          commit="$(git rev-parse HEAD | cut -c1-12)"

          # set the artifact directory containing the file we want to rename
          if [ "$FOR_DOCKER" == "true" ]; then
            artifact_path="$DOCKER_ARTIFACT_DIR"
          else
            artifact_path="$PACKAGE_ARTIFACT_DIR"
          fi

          # For docker, package_flavour=both produces TWO archives in the
          # artifact dir (prod + -relwithdebinfo). Loop over each so both get
          # renamed; the per-archive suffix is preserved by inspecting the
          # basename. For deb/rpm, memgraph_*.deb (underscore) /
          # memgraph-[0-9]*.rpm match the main package; memgraph-debuginfo_*
          # is a separate companion produced by component packaging.
          if [ "$FOR_DOCKER" == "true" ]; then
            for old_name in "$artifact_path"/memgraph*-docker.tar.gz; do
              [ -e "$old_name" ] || continue
              if [[ "$old_name" == *"-relwithdebinfo-docker.tar.gz" ]]; then
                suffix="-relwithdebinfo"
              else
                suffix=""
              fi
              new_name="memgraph-${tag}_pr${pr}_${commit}${suffix}-docker.tar.gz"
              mv -v "$old_name" "$artifact_path/$new_name"
            done
          else
            if [[ "$OS" == *"debian"* || "$OS" == *"ubuntu"* ]]; then
              old_name="$(ls -1 $artifact_path/memgraph_*.deb 2>/dev/null | head -n 1)"
              new_name="memgraph_${tag}+pr${pr}~${commit}-1_${ARCH}64.deb"
            else
              old_name="$(ls -1 $artifact_path/memgraph-[0-9]*.rpm 2>/dev/null | head -n 1)"
              if [[ "$ARCH" == "amd" ]]; then
                arch_str="x86_64"
              else
                arch_str="aarch64"
              fi
              new_name="memgraph-${tag}_0.pr${pr}.${commit}-1.${arch_str}.rpm"
            fi
            mv -v $old_name "$artifact_path/$new_name"
          fi

      - name: Output Package S3 URL
        id: output_package_s3_url
        run: |
          # Pick the main package, not memgraph-debuginfo, which is a sibling
          # produced by component packaging and uploaded as part of the s3 sync.
          # For docker package_flavour=both the dir contains both prod and
          # -relwithdebinfo archives; emit the prod URL since it's the
          # customer-facing image and callers downstream expect a single URL.
          if [[ "$FOR_DOCKER" == "true" ]]; then
            filename="$(ls -1 $DOCKER_ARTIFACT_DIR/memgraph*-docker.tar.gz 2>/dev/null | grep -v -- '-relwithdebinfo-docker.tar.gz$' | head -n 1)"
            if [[ -z "$filename" ]]; then
              # flavour=debug only — fall back to the debug archive.
              filename="$(ls -1 $DOCKER_ARTIFACT_DIR/memgraph* 2>/dev/null | head -n 1)"
            fi
          elif [[ "$OS" == *"debian"* || "$OS" == *"ubuntu"* ]]; then
            filename="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph_*.deb 2>/dev/null | head -n 1)"
          else
            filename="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph-[0-9]*.rpm 2>/dev/null | head -n 1)"
          fi
          # URL-encode the filename to handle unsafe characters like +, ~, etc.
          encoded_filename=$(python3 -c "import urllib.parse; import sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$(basename "$filename")")
          S3_URL="https://s3.eu-west-1.amazonaws.com/${S3_BUCKET}/${S3_DEST_DIR}/${{ env.ARTIFACT_NAME }}/${encoded_filename}"
          echo "package_s3_url=$S3_URL" >> $GITHUB_OUTPUT

      - name: "Upload to Github"
        if: ${{  inputs.push_to_github == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: "${{ env.FOR_DOCKER == 'true' && env.DOCKER_ARTIFACT_DIR || env.PACKAGE_ARTIFACT_DIR }}/memgraph*"

      - name: "Upload to S3"
        if: ${{ inputs.push_to_s3 == 'true' }}
        run:
          aws s3 sync $SOURCE_DIR s3://${S3_BUCKET}/$DEST_DIR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.s3_region }}
          SOURCE_DIR: ${{ env.FOR_DOCKER == 'true' && env.DOCKER_ARTIFACT_DIR || env.PACKAGE_ARTIFACT_DIR }}
          DEST_DIR: "${{ inputs.s3_dest_dir }}/${{ env.ARTIFACT_NAME }}/"

      - name: Clean up heaptrack
        if: ${{ inputs.build_type == 'RelWithDebInfo' && (inputs.package_flavour == 'debug' || inputs.package_flavour == 'both') && env.FOR_DOCKER == 'true' }}
        run: |
          rm -rf release/docker/heaptrack

      - name: "Clean up Docker"
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh
