name: Reusable package make and upload

on:
  workflow_call:
    inputs:
      os:
        type: string
        description: "Target os. Default value is ubuntu-24.04."
        default: ubuntu-24.04
      arch:
        type: string
        description: "Target architecture. Default value is amd."
        default: amd
      build_type:
        type: string
        description: "Memgraph Build type. Default value is Release."
        default: Release
      split_debug:
        type: boolean
        description: "Extract debug info into sidecar .debug files (requires RelWithDebInfo or Debug build type)."
        default: false
      package_flavour:
        type: string
        description: "Package flavour for the deb/rpm: 'prod' (stripped binary, symbols archived separately) or 'debug' ('-relwithdebinfo' suffix, unstripped). Debug requires build_type=RelWithDebInfo. Docker image flavours are controlled separately via build_docker_image."
        default: prod
      build_docker_image:
        type: string
        description: "Docker image(s) to produce alongside the deb: 'none' (default), 'prod', 'debug', or 'both'. Builds run from the same memgraph binary as the deb so the ELF build-id is shared between standalone-deb installs and container installs. Requires os=ubuntu-24.04."
        default: 'none'
      additional_build_args:
        type: string
        description: "Additional cmake/build flags forwarded to mgbuild.sh. Default value is empty."
        default: ''
      push_to_github:
        type: string
        description: "Should the final package be pushed to GitHub. Default value is false."
        default: false
      push_to_s3:
        type: string
        description: "Should the final package be pushed to an S3 bucket. Default value is false."
        default: false
      s3_bucket:
        type: string
        description: "Name of the target S3 bucket."
        default: ''
      s3_region:
        type: string
        description: "Region for the target S3 bucket."
        default: eu-west-1
      s3_dest_dir:
        type: string
        description: "Target dir path in S3 bucket."
        default: ''
      ref:
        type: string
        description: "Git ref to checkout. Default value is the current ref."
        default: ''
      generate_sbom:
        type: boolean
        description: "Generate SBOM"
        default: false
      run_smoke_tests:
        type: boolean
        description: "Run smoke tests on images after building (tests against previous tagged image)"
        default: false
    outputs:
      package_s3_url:
        description: "The URL of the package in the S3 bucket."
        value: ${{ jobs.PackageAndUpload.outputs.package_s3_url }}

env:
  TOOLCHAIN: v7
  GENERATE_SBOM: ${{ inputs.generate_sbom }}
  ARCH: ${{ inputs.arch }}
  BUILD_TYPE: ${{ inputs.build_type }}
  SPLIT_DEBUG: ${{ inputs.split_debug }}
  PACKAGE_FLAVOUR: ${{ inputs.package_flavour }}
  BUILD_DOCKER_IMAGE: ${{ inputs.build_docker_image }}
  OS: ${{ inputs.os }}
  ADDITIONAL_BUILD_ARGS: ${{ inputs.additional_build_args }}
  PUSH_TO_GITHUB: ${{ inputs.push_to_github }}
  PUSH_TO_S3: ${{ inputs.push_to_s3 }}
  S3_BUCKET: ${{ inputs.s3_bucket }}
  S3_REGION: ${{ inputs.s3_region }}
  S3_DEST_DIR: ${{ inputs.s3_dest_dir }}
  REF: ${{ inputs.ref }}
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}

jobs:
  PackageAndUpload:
    runs-on: ${{ (inputs.arch == 'arm') && fromJSON('["self-hosted", "DockerMgBuild", "ARM64"]') || fromJSON((inputs.os == 'centos-10' || inputs.os == 'rocky-10') && '["self-hosted", "DockerMgBuild", "X64", "x86-64-v3"]' || '["self-hosted", "DockerMgBuild", "X64"]') }}
    timeout-minutes: 30
    outputs:
      package_s3_url: ${{ steps.output_package_s3_url.outputs.package_s3_url }}
    steps:
      - name: "Validate S3 dest dir for official package"
        if: ${{ inputs.push_to_s3 == 'true' && inputs.s3_bucket == 'download.memgraph.com' }}
        run: |
          # Only the prod flavour (stripped binary, symbols archived externally)
          # belongs on the customer download site. Debug-flavour debs and any
          # docker image (including the debug docker image) go to the internal
          # deps bucket instead.
          if [[ "$PACKAGE_FLAVOUR" == 'debug' ]]; then
            echo -e "Error: You are pushing a debug-flavour deb to 'download.memgraph.com'."
            exit 1
          fi
          if [[ "$BUILD_DOCKER_IMAGE" != 'none' ]]; then
            echo -e "Error: Docker images do not belong on 'download.memgraph.com'; push them to the internal deps bucket."
            exit 1
          fi
          if ! [[ "$S3_DEST_DIR" =~ memgraph/v[0-9]\.[0-9]+\.[0-9]+$ ]]; then
            echo -e "Error: $S3_DEST_DIR is not a valid official format. When pushing to 'download.memgraph.com' the dest dir has to match format 'memgraph/vX.Y.Z'!"
            exit 1
          fi
          echo -e "Passed: Dest dir $S3_DEST_DIR has a valid official format."

      - name: "Set up repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0 # Required because of release/get_version.py
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: "Log in to Docker Hub"
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Set artifact name and dir"
        run: |
          # The deb/rpm is always produced. Its S3 subdir (PKG_ARTIFACT_NAME)
          # follows the historical convention "<os>[-malloc][-aarch64]
          # [-relwithdebinfo]" so existing download links and tooling that
          # build URLs from this naming keep working. The "PKG_" prefix
          # covers both deb (debian/ubuntu) and rpm (centos/fedora/rocky)
          # since both formats are produced by this workflow.
          artifact_dir='build/output'
          pkg_artifact_name="$OS"
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            pkg_artifact_name="${pkg_artifact_name}-malloc"
          fi
          if [[ "$ARCH" == 'arm' ]]; then
            pkg_artifact_name="${pkg_artifact_name}-aarch64"
          fi
          if [[ "$BUILD_TYPE" == 'RelWithDebInfo' && "$PACKAGE_FLAVOUR" == 'debug' ]]; then
            pkg_artifact_name="${pkg_artifact_name}-relwithdebinfo"
          fi
          echo "PKG_ARTIFACT_NAME=$pkg_artifact_name" >> $GITHUB_ENV
          echo "PACKAGE_ARTIFACT_DIR=${artifact_dir}/package" >> $GITHUB_ENV

          # Docker artifact dir/name only when build_docker_image != 'none'.
          # Same suffix rules as the deb name but starting from 'docker';
          # individual image filenames within the dir carry their own
          # -relwithdebinfo suffix for the debug variant.
          if [[ "$BUILD_DOCKER_IMAGE" != "none" ]]; then
            docker_artifact_name='docker'
            if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
              docker_artifact_name="${docker_artifact_name}-malloc"
            fi
            if [[ "$ARCH" == 'arm' ]]; then
              docker_artifact_name="${docker_artifact_name}-aarch64"
            fi
            echo "DOCKER_ARTIFACT_NAME=$docker_artifact_name" >> $GITHUB_ENV
            echo "DOCKER_ARTIFACT_DIR=${artifact_dir}/docker" >> $GITHUB_ENV
          fi

      - name: "Validate build_docker_image"
        run: |
          case "$BUILD_DOCKER_IMAGE" in
            none|prod|debug|both) ;;
            *)
              echo "Error: build_docker_image must be 'none', 'prod', 'debug', or 'both' (got '$BUILD_DOCKER_IMAGE')" >&2
              exit 1
            ;;
          esac
          if [[ "$BUILD_DOCKER_IMAGE" != "none" ]]; then
            if [[ "$OS" != "ubuntu-24.04" ]]; then
              echo "Error: build_docker_image='$BUILD_DOCKER_IMAGE' requires os=ubuntu-24.04 (got '$OS')" >&2
              exit 1
            fi
            if [[ "$BUILD_TYPE" != "RelWithDebInfo" ]]; then
              echo "Error: build_docker_image='$BUILD_DOCKER_IMAGE' requires build_type=RelWithDebInfo (got '$BUILD_TYPE')" >&2
              exit 1
            fi
            # Producing the debug docker image (or 'both') needs the
            # memgraph-debuginfo deb to install on top of the main deb. CPack
            # only emits that companion package when MG_SPLIT_DEBUG is on, so
            # force split-debug here regardless of what the caller passed.
            if [[ "$BUILD_DOCKER_IMAGE" == "debug" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
              echo "SPLIT_DEBUG=true" >> $GITHUB_ENV
            fi
          fi

      - name: Set Additional Build Args
        run: |
          if [[ -z "$ADDITIONAL_BUILD_ARGS" ]]; then
            args="--disable-testing"
          else
            args="$ADDITIONAL_BUILD_ARGS --disable-testing"
          fi
          echo "ADDITIONAL_BUILD_ARGS=$args" >> $GITHUB_ENV
          echo "Final build args: $args"

      - name: "Spin up mgbuild container"
        run: |
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: "Build Memgraph binaries"
        run: |
          # $SPLIT_DEBUG may have been forced on in the Validate step (e.g. for
          # package_flavour=both, which needs the debuginfo deb).
          SPLIT_DEBUG_ARG=""
          if [[ "$SPLIT_DEBUG" == "true" ]]; then
            SPLIT_DEBUG_ARG="--split-debug"
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          build-memgraph $ADDITIONAL_BUILD_ARGS $SPLIT_DEBUG_ARG \
          --conan-remote $CONAN_REMOTE \
          --conan-username $CONAN_USERNAME \
          --conan-password $CONAN_PASSWORD

      - name: "Make package"
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-memgraph

      - name: "Copy package"
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy \
          --package \
          --dest-dir $PACKAGE_ARTIFACT_DIR

      - name: "Upload debug symbols"
        # Use $SPLIT_DEBUG (env) rather than inputs.split_debug so the override
        # from the Validate step (e.g. for package_flavour=both) is honoured.
        if: ${{ env.SPLIT_DEBUG == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy-debug-symbols \
          --dest-dir build/debug-symbols
          bash tools/ci/upload-debug-symbols.sh build/debug-symbols

      - name: "Copy SBOM"
        if: ${{ env.GENERATE_SBOM == 'true' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy \
          --sbom

      - name: "Build gssapi wheel for smoke image"
        # Only needed for deb-only runs (no shipping docker image to smoke
        # test). When build_docker_image != 'none' the shipping prod docker
        # image gets the bolt smoke test directly.
        if: ${{ env.BUILD_DOCKER_IMAGE == 'none' && inputs.run_smoke_tests }}
        run: |
          # gssapi has no prebuilt linux wheels on PyPI, so build one inside
          # the MGBUILD container (which has libkrb5/krb5-devel available) and
          # drop it into a local wheels dir that the smoke image build will
          # pip-install from via --find-links.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-gssapi \
            --dest-dir build/output/smoke-wheels

      - name: "Build smoke image from package"
        if: ${{ env.BUILD_DOCKER_IMAGE == 'none' && inputs.run_smoke_tests }}
        run: |
          image_tag="smoke-${OS}-${ARCH}-${BUILD_TYPE}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            package-smoke-image \
            --src-dir $PACKAGE_ARTIFACT_DIR \
            --image-tag "$image_tag" \
            --wheels-dir build/output/smoke-wheels
          echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
          echo "Resolved IMAGE_TAG=$image_tag"

      - name: "Build heaptrack"
        # Heaptrack ships in the debug docker image only, so build when we
        # are producing a debug image (build_docker_image=debug or both).
        if: ${{ inputs.build_docker_image == 'debug' || inputs.build_docker_image == 'both' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          build-heaptrack

      - name: "Copy heaptrack"
        if: ${{ inputs.build_docker_image == 'debug' || inputs.build_docker_image == 'both' }}
        run: |
          mkdir -p release/docker
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          copy-heaptrack \
          --dest-dir "$(pwd)/release/docker"

      - name: "Build OpenSSL"
        if: ${{ env.BUILD_DOCKER_IMAGE != 'none' }}
        run: |
          # This step is necessary so that we can build custom packages of OpenSSL and libssl3 for
          # the Docker images. These packages will be installed by apt, and as long as the remote
          # version provided by Ubuntu is less than our version, our package will not be overwritten.
          # This means that anything within the container that depends on OpenSSL should use our
          # version.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-ssl \
            --version "3.5.4" \
            --conan-remote $CONAN_REMOTE \
            --conan-username $CONAN_USERNAME \
            --conan-password $CONAN_PASSWORD

      - name: "Build gssapi wheel"
        if: ${{ env.BUILD_DOCKER_IMAGE != 'none' }}
        run: |
          # gssapi has no prebuilt linux wheels on PyPI, so build one in the
          # MGBUILD container (which has libkrb5/krb5-devel) and drop it into
          # release/docker/wheels so the python-base Dockerfile stage can
          # install it from the local wheel rather than hitting PyPI.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            build-gssapi \
            --dest-dir release/docker/wheels

      - name: "Stop mgbuild container"
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          stop --remove

      # The docker image creation is split into two steps — one per flavour —
      # so build_docker_image=both can produce prod + debug images sequentially
      # from a single build. Both images share the same memgraph_*.deb; the
      # debug image additionally installs memgraph-debuginfo_*.deb on top.
      - name: "Create docker image (prod)"
        if: ${{ inputs.build_docker_image == 'prod' || inputs.build_docker_image == 'both' }}
        run: |
          malloc=false
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            malloc=true
          fi
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-docker \
          --src-dir $PACKAGE_ARTIFACT_DIR \
          --dest-dir $DOCKER_ARTIFACT_DIR \
          --generate-sbom $GENERATE_SBOM \
          --malloc $malloc \
          --custom-mirror $USE_CUSTOM_MIRROR \
          --package-flavour prod \
          --keep-image-loaded ${{ inputs.run_smoke_tests }}
          # Pick the prod archive specifically — when build_docker_image=both
          # the debug step (below) will produce a sibling -relwithdebinfo
          # archive in the same dir, and we want IMAGE_TAG to refer to the
          # prod image so the bolt smoke test runs against it.
          image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-docker.tar.gz 2>/dev/null | grep -v -- '-relwithdebinfo-docker.tar.gz$' | head -n 1)"
          if [[ -z "$image_archive" ]]; then
            echo "Error: Could not find prod docker image archive in '$DOCKER_ARTIFACT_DIR'."
            exit 1
          fi
          image_tag="$(basename "$image_archive")"
          image_tag="${image_tag#memgraph-}"
          image_tag="${image_tag%-docker.tar.gz}"
          echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
          echo "Resolved IMAGE_TAG=$image_tag"

      - name: "Create docker image (debug)"
        if: ${{ inputs.build_docker_image == 'debug' || inputs.build_docker_image == 'both' }}
        run: |
          malloc=false
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            malloc=true
          fi
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          # When build_docker_image=both the prod step above already kept the
          # prod image loaded for smoke tests; the debug image doesn't need
          # to be loaded (smoke tests use prod since both share the same
          # memgraph binary).
          if [[ "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            keep_loaded=false
          else
            keep_loaded=${{ inputs.run_smoke_tests }}
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          package-docker \
          --src-dir $PACKAGE_ARTIFACT_DIR \
          --dest-dir $DOCKER_ARTIFACT_DIR \
          --generate-sbom $GENERATE_SBOM \
          --malloc $malloc \
          --custom-mirror $USE_CUSTOM_MIRROR \
          --package-flavour debug \
          --keep-image-loaded "$keep_loaded"
          # Only set IMAGE_TAG when the debug step is the sole producer
          # (build_docker_image=debug). For 'both', IMAGE_TAG was set by the
          # prod step and the bolt smoke test targets that prod image.
          if [[ "$BUILD_DOCKER_IMAGE" == "debug" ]]; then
            image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-relwithdebinfo-docker.tar.gz 2>/dev/null | head -n 1)"
            if [[ -z "$image_archive" ]]; then
              echo "Error: Could not find debug docker image archive in '$DOCKER_ARTIFACT_DIR'."
              exit 1
            fi
            image_tag="$(basename "$image_archive")"
            image_tag="${image_tag#memgraph-}"
            image_tag="${image_tag%-docker.tar.gz}"
            echo "IMAGE_TAG=$image_tag" >> $GITHUB_ENV
            echo "Resolved IMAGE_TAG=$image_tag"
          fi

      - name: "Bolt smoke test (no-arg startup)"
        if: ${{ env.BUILD_DOCKER_IMAGE != 'none' }}
        run: |
          image="memgraph/memgraph:${IMAGE_TAG}"
          # --keep-image-loaded is only true when run_smoke_tests is set, so
          # load from the tarball when needed.
          if ! docker image inspect "$image" >/dev/null 2>&1; then
            image_archive="$(ls -1t "$DOCKER_ARTIFACT_DIR"/memgraph*-docker.tar.gz 2>/dev/null | head -n 1)"
            docker load -i "$image_archive"
          fi
          ./tools/ci/smoke_test_docker_image.sh "$image"

      - name: "Generate Build SBOM"
        if: ${{ env.GENERATE_SBOM == 'true'  && env.BUILD_DOCKER_IMAGE == 'none' }}
        run: |
          ./tools/ci/sbom/build-sbom.sh

      - name: "Upload SBOM Files"
        if: ${{ env.GENERATE_SBOM == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: memgraph-sbom
          path: sbom/

      - name: "Upload SBOM to S3"
        if: ${{ env.GENERATE_SBOM == 'true' && inputs.push_to_s3 == 'true' && startsWith(inputs.ref, 'v') && contains(inputs.ref, '-rc') }}
        run: |
          aws s3 sync sbom/ "s3://${S3_BUCKET}/${S3_DEST_DIR}/sbom/"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.s3_region }}

      - name: Run smoke tests
        if: ${{ inputs.run_smoke_tests }}
        env:
          MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
          MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
        run: |
          # Test against the latest release version. The previous-version
          # tag needs to match the flavour of the image we just built:
          #   - build_docker_image=debug -> we're testing the debug docker
          #     image (suffix -relwithdebinfo).
          #   - build_docker_image in (prod, both) -> we're testing the prod
          #     docker image (IMAGE_TAG was set by the prod step).
          #   - build_docker_image=none -> we're testing the smoke image
          #     built from the deb; suffix follows the deb's PACKAGE_FLAVOUR.
          last_version="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          last_version="${last_version#v}"
          if [[ "$BUILD_TYPE" == "RelWithDebInfo" \
              && ( "$BUILD_DOCKER_IMAGE" == "debug" \
                   || ( "$BUILD_DOCKER_IMAGE" == "none" && "$PACKAGE_FLAVOUR" == "debug" ) ) ]]; then
            last_version="${last_version}-relwithdebinfo"
          fi
          echo "Resolved LAST_VERSION=$last_version"
          docker pull "memgraph/memgraph:${last_version}"

          export MEMGRAPH_NEXT_DOCKERHUB_IMAGE="memgraph/memgraph:${IMAGE_TAG}"
          export MEMGRAPH_LAST_DOCKERHUB_IMAGE="memgraph/memgraph:${last_version}"

          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
            --organization-name $MEMGRAPH_ORGANIZATION_NAME \
            test-memgraph smoke \
            --next-image $MEMGRAPH_NEXT_DOCKERHUB_IMAGE \
            --last-image $MEMGRAPH_LAST_DOCKERHUB_IMAGE

      - name: "Rename Package"
        if: github.ref == 'refs/heads/master' && !inputs.ref
        run: |
          # During testing, we keep the default CPack naming (previous tag +
          # commit count + commit hash). On master, retag with the latest PR
          # number + short commit so the artifacts in S3 are easy to map to
          # a specific PR.
          tag="$(tools/ci/get_latest_tag.sh)"
          pr="$(git log --pretty=%B | grep -oP '(?<=\(#)\d+(?=\))' | head -n 1)"
          commit="$(git rev-parse HEAD | cut -c1-12)"

          # Always rename the deb/rpm in PACKAGE_ARTIFACT_DIR. memgraph_*.deb
          # (underscore) / memgraph-[0-9]*.rpm match the main package;
          # memgraph-debuginfo_* is a separate companion produced by
          # component packaging and stays under its CPack name.
          if [[ "$OS" == *"debian"* || "$OS" == *"ubuntu"* ]]; then
            old_name="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph_*.deb 2>/dev/null | head -n 1)"
            new_name="memgraph_${tag}+pr${pr}~${commit}-1_${ARCH}64.deb"
          else
            old_name="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph-[0-9]*.rpm 2>/dev/null | head -n 1)"
            if [[ "$ARCH" == "amd" ]]; then
              arch_str="x86_64"
            else
              arch_str="aarch64"
            fi
            new_name="memgraph-${tag}_0.pr${pr}.${commit}-1.${arch_str}.rpm"
          fi
          mv -v "$old_name" "$PACKAGE_ARTIFACT_DIR/$new_name"

          # Also rename any docker image archives produced this run.
          # build_docker_image=both yields TWO archives in DOCKER_ARTIFACT_DIR
          # (prod + -relwithdebinfo); the suffix is preserved per file.
          if [[ "$BUILD_DOCKER_IMAGE" != "none" ]]; then
            for old_name in "$DOCKER_ARTIFACT_DIR"/memgraph*-docker.tar.gz; do
              [ -e "$old_name" ] || continue
              if [[ "$old_name" == *"-relwithdebinfo-docker.tar.gz" ]]; then
                suffix="-relwithdebinfo"
              else
                suffix=""
              fi
              new_name="memgraph-${tag}_pr${pr}_${commit}${suffix}-docker.tar.gz"
              mv -v "$old_name" "$DOCKER_ARTIFACT_DIR/$new_name"
            done
          fi

      - name: Output Package S3 URL
        id: output_package_s3_url
        run: |
          # Emit the deb/rpm URL. Workflows that need the docker image URL
          # construct it themselves from PKG_ARTIFACT_NAME / DOCKER_ARTIFACT_NAME
          # and the known filename pattern (see build_rc.yml / daily_build.yml).
          if [[ "$OS" == *"debian"* || "$OS" == *"ubuntu"* ]]; then
            filename="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph_*.deb 2>/dev/null | head -n 1)"
          else
            filename="$(ls -1 $PACKAGE_ARTIFACT_DIR/memgraph-[0-9]*.rpm 2>/dev/null | head -n 1)"
          fi
          # URL-encode the filename to handle unsafe characters like +, ~, etc.
          encoded_filename=$(python3 -c "import urllib.parse; import sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$(basename "$filename")")
          S3_URL="https://s3.eu-west-1.amazonaws.com/${S3_BUCKET}/${S3_DEST_DIR}/${PKG_ARTIFACT_NAME}/${encoded_filename}"
          echo "package_s3_url=$S3_URL" >> $GITHUB_OUTPUT

      # Upload the deb/rpm (always produced). Docker images (when produced)
      # are uploaded by the separate docker upload step below so they land
      # under their own DOCKER_ARTIFACT_NAME S3 subdir, preserving the
      # existing convention where ".../<os>/" holds packages and ".../docker/"
      # holds image tarballs.
      - name: "Upload package to Github"
        if: ${{ inputs.push_to_github == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.PKG_ARTIFACT_NAME }}
          path: "${{ env.PACKAGE_ARTIFACT_DIR }}/memgraph*"

      - name: "Upload package to S3"
        if: ${{ inputs.push_to_s3 == 'true' }}
        run:
          aws s3 sync $SOURCE_DIR s3://${S3_BUCKET}/$DEST_DIR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.s3_region }}
          SOURCE_DIR: ${{ env.PACKAGE_ARTIFACT_DIR }}
          DEST_DIR: "${{ inputs.s3_dest_dir }}/${{ env.PKG_ARTIFACT_NAME }}/"

      - name: "Upload docker images to Github"
        if: ${{ inputs.push_to_github == 'true' && env.BUILD_DOCKER_IMAGE != 'none' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.DOCKER_ARTIFACT_NAME }}
          path: "${{ env.DOCKER_ARTIFACT_DIR }}/memgraph*"

      - name: "Upload docker images to S3"
        if: ${{ inputs.push_to_s3 == 'true' && env.BUILD_DOCKER_IMAGE != 'none' }}
        run:
          aws s3 sync $SOURCE_DIR s3://${S3_BUCKET}/$DEST_DIR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.s3_region }}
          SOURCE_DIR: ${{ env.DOCKER_ARTIFACT_DIR }}
          DEST_DIR: "${{ inputs.s3_dest_dir }}/${{ env.DOCKER_ARTIFACT_NAME }}/"

      - name: Clean up heaptrack
        if: ${{ inputs.build_docker_image == 'debug' || inputs.build_docker_image == 'both' }}
        run: |
          rm -rf release/docker/heaptrack

      - name: "Clean up Docker"
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh
