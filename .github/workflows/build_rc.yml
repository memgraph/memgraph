name: Build Release Candidate
concurrency:
  group: Build-Release-Candidate-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "Version of the release candidate (X.Y.Z)."
        required: true
      rc_number:
        type: string
        description: "Release candidate number (e.g., rc1, rc2, etc.)."
        required: true
      overwrite_tag:
        type: boolean
        description: "Overwrite the existing tag if it exists."
        default: false
      run_tests:
        type: boolean
        description: "Run tests."
        default: true
      run_stress_large:
        type: boolean
        description: "Run stress test large."
        default: true
      run_stress_tests:
        type: boolean
        description: "Run stress tests."
        default: true
      package_memgraph:
        type: boolean
        description: "Build Memgraph packages."
        default: true
      build_docker:
        type: boolean
        description: "Build Memgraph Docker images."
        default: true
      run_issu_test:
        type: boolean
        description: "Run ISSU test."
        default: true
      build_mage:
        type: boolean
        description: "Build MAGE."
        default: true
      mock:
        type: boolean
        description: "Build mock RC."
        default: false

jobs:
  PrepareReleaseBranch:
    name: Prepare Release Branch
    runs-on: ubuntu-24.04
    outputs:
      branch_name: ${{ steps.check_branch.outputs.branch_name }}
      tag_name: ${{ steps.check_tag.outputs.tag_name }}
      short_version: ${{ steps.create_short_version.outputs.short_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Git user
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

      - name: Create Short Version
        id: create_short_version
        run: |
          short_version=$(echo "${{ inputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+)\.0$/\1/')
          echo "short_version=$short_version" >> $GITHUB_OUTPUT

      - name: Check if release branch exists and checkout
        id: check_branch
        run: |
          branch_name="release/${{ steps.create_short_version.outputs.short_version }}"
          if git ls-remote --exit-code --heads origin "$branch_name"; then
            echo "Branch $branch_name exists. Checking out."
            git checkout "$branch_name"
          else
            echo "Branch $branch_name does not exist. Creating a new branch."
            git checkout -b "$branch_name"
          fi
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

      - name: Set Memgraph Override Version
        run: |
          sed -i "s/set(MEMGRAPH_OVERRIDE_VERSION \"\")/set(MEMGRAPH_OVERRIDE_VERSION \"${{ inputs.version }}\")/" CMakeLists.txt
          git add CMakeLists.txt
          # this will fail if there are no changes, but we don't care
          git commit -m "Update CMakeLists.txt with new memgraph override version" || true

      - name: Check if tag exists
        id: check_tag
        run: |
          tag_name="v${{ inputs.version }}-${{ inputs.rc_number }}"
          if git ls-remote --exit-code --tags origin "$tag_name"; then
            echo "Tag $tag_name exists."
            if [ "${{ inputs.overwrite_tag }}" == "true" ]; then
              echo "Overwriting existing tag."
              git tag -d "$tag_name"
              git push origin ":refs/tags/$tag_name"
            else
              echo "Skipping tag creation as it already exists."
              exit 1
            fi
          else
            echo "Tag $tag_name does not exist. Proceeding to create a new tag."
          fi
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git push --set-upstream origin "${{ steps.check_branch.outputs.branch_name }}"
          git tag "${{ steps.check_tag.outputs.tag_name }}"
          git push origin "${{ steps.check_tag.outputs.tag_name }}"

  TestRC:
    if: ${{ inputs.run_tests }}
    name: Test Release Candidate
    needs: PrepareReleaseBranch
    uses: ./.github/workflows/reusable_release_tests.yaml
    with:
      os: ubuntu-24.04
      arch: amd
      threads: 24
      build_type: RelWithDebInfo
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit

  StressTestLarge:
    if: ${{ inputs.run_stress_large }}
    name: Stress Test Large
    needs: PrepareReleaseBranch
    uses: ./.github/workflows/reusable_release_tests.yaml
    with:
      os: ubuntu-24.04
      arch: "amd"
      threads: 24
      build_type: RelWithDebInfo
      run_stress_large: 'true'
      run_release_tests: 'false'
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit

  PackageArtifact:
    # Runs if either the deb production or the docker production is wanted.
    # Each ubuntu-24.04 matrix entry produces deb + docker from the same
    # build so the ELF build-id is shared; inputs.build_docker toggles the
    # docker production within those entries.
    if: ${{ inputs.package_memgraph || inputs.build_docker }}
    name: Package Artifact
    needs: PrepareReleaseBranch
    strategy:
      fail-fast: false
      matrix:
        # Non-ubuntu-24.04 OSes build deb/rpm only — docker images are
        # ubuntu-24.04-based and live in the explicit ubuntu-24.04 includes
        # below. package_flavour=prod for every entry (the deb shipped on
        # download.memgraph.com), with split-debug producing the
        # memgraph-debuginfo companion that the debug docker image installs.
        os: [centos-9, centos-10, debian-12, debian-13, fedora-42, rocky-10, ubuntu-22.04]
        arch: [amd]
        package_flavour: [prod]
        additional_build_args: ['']
        include:
          - os: debian-12
            package_flavour: prod
            arch: arm
            additional_build_args: ''
          - os: debian-13
            package_flavour: prod
            arch: arm
            additional_build_args: ''
          - os: fedora-42
            package_flavour: prod
            arch: arm
            additional_build_args: ''
          # ubuntu-24.04 entries explicitly listed so each can set
          # build_docker_image. amd/arm without --disable-jemalloc produce
          # both docker images (prod + debug, shipping path); the --disable-jemalloc
          # variants ship only the debug docker image (heaptrack/malloc
          # debugging use case).
          - os: ubuntu-24.04
            package_flavour: prod
            arch: amd
            additional_build_args: ''
            build_docker_image: both
          - os: ubuntu-24.04
            package_flavour: prod
            arch: arm
            additional_build_args: ''
            build_docker_image: both
          - os: ubuntu-24.04
            package_flavour: prod
            arch: amd
            additional_build_args: '--disable-jemalloc'
            build_docker_image: debug
          - os: ubuntu-24.04
            package_flavour: prod
            arch: arm
            additional_build_args: '--disable-jemalloc'
            build_docker_image: debug
    uses: ./.github/workflows/reusable_package.yaml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build_type: RelWithDebInfo
      split_debug: ${{ matrix.package_flavour == 'prod' }}
      package_flavour: ${{ matrix.package_flavour }}
      # inputs.build_docker is the master toggle for docker production; the
      # matrix entry's build_docker_image (when set) chooses prod/debug/both.
      # No-match (non-ubuntu-24.04, or build_docker=false) -> 'none'.
      build_docker_image: ${{ inputs.build_docker && (matrix.build_docker_image || 'none') || 'none' }}
      push_to_github: 'false'
      push_to_s3: 'true'
      s3_bucket: deps.memgraph.io
      s3_region: eu-west-1
      s3_dest_dir: "memgraph${{ inputs.mock && '-mock-rc' || '' }}/${{ needs.PrepareReleaseBranch.outputs.tag_name }}"
      additional_build_args: ${{ matrix.additional_build_args }}
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
      generate_sbom: ${{ (matrix.os == 'ubuntu-24.04' && matrix.arch == 'amd' && matrix.additional_build_args == '' && matrix.build_docker_image == 'both') && true || false }}
      run_smoke_tests: ${{ matrix.build_docker_image != null && matrix.build_docker_image != 'none' }}
    secrets: inherit

  BuildAndTestMAGE:
    if: ${{ inputs.build_mage }}
    name: Build and Test MAGE
    # Depends on PackageArtifact so the memgraph debs we wget into the MAGE
    # build context have been produced and uploaded to S3. This is what gives
    # us a single ELF build-id across the standalone memgraph package and the
    # memgraph binary embedded in each MAGE image — debuginfod uploads from
    # PackageArtifact also serve crashes from MAGE.
    needs: [PrepareReleaseBranch, PackageArtifact]
    uses: ./.github/workflows/reusable_package_mage.yaml
    strategy:
      fail-fast: false
      matrix:
        # Matrix is fully explicit (no cross-product) so each entry can
        # declare its own build_docker_image. Standard Dockerfile.release
        # entries collapse the (prod, X) + (debug, X) pairs into single
        # jobs with build_docker_image='both' (one build feeds both
        # docker variants — see mage/Dockerfile.release prod vs
        # relwithdebinfo stages). cuda / cugraph variants stay debug-only
        # because there's no matching prod variant in flight today.
        include:
          # amd + arm, no-malloc — collapsed pair
          - build_arch: "amd"
            package_flavour: "prod"
            build_docker_image: "both"
            malloc: false
            cuda: false
            cugraph: false
          - build_arch: "arm"
            package_flavour: "prod"
            build_docker_image: "both"
            malloc: false
            cuda: false
            cugraph: false
          # amd + malloc — collapsed pair (matrix had both prod and debug)
          - build_arch: "amd"
            package_flavour: "prod"
            build_docker_image: "both"
            malloc: true
            cuda: false
            cugraph: false
          # arm + malloc — debug-only, no prod counterpart in current matrix
          - build_arch: "arm"
            package_flavour: "debug"
            build_docker_image: "debug"
            malloc: true
            cuda: false
            cugraph: false
          # cuda — debug-only
          - build_arch: "amd"
            package_flavour: "debug"
            build_docker_image: "debug"
            cuda: true
            malloc: false
            cugraph: false
          # cugraph — debug-only (per scope decision: don't collapse cugraph)
          - build_arch: "amd"
            package_flavour: "debug"
            build_docker_image: "debug"
            cuda: false
            malloc: false
            cugraph: true
    with:
      arch: ${{ matrix.build_arch }}
      build_type: RelWithDebInfo
      # Force split-debug on for the same reason PackageArtifact does:
      # 'both' / 'debug' Dockerfile targets need memgraph-debuginfo.deb,
      # which CPack only emits with MG_SPLIT_DEBUG=ON.
      split_debug: true
      package_flavour: ${{ matrix.package_flavour }}
      build_docker_image: ${{ matrix.build_docker_image }}
      # PackageArtifact now builds ubuntu-24.04 for every (arch, malloc)
      # combination the MAGE matrix below references, so every entry reuses
      # the customer-facing memgraph deb. Same ELF build-id across the
      # standalone deb and the binary embedded in each MAGE image.
      memgraph_download_link: ${{ format('https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/memgraph{0}/{1}/ubuntu-24.04{2}{3}/memgraph_{4}-1_{5}.deb', inputs.mock && '-mock-rc' || '', needs.PrepareReleaseBranch.outputs.tag_name, matrix.malloc && '-malloc' || '', matrix.build_arch == 'arm' && '-aarch64' || '', inputs.version, matrix.build_arch == 'arm' && 'arm64' || 'amd64') }}
      # Debug-image variants install memgraph-debuginfo on top of the main
      # memgraph deb so gdb resolves symbols from the .debug sidecars
      # offline (the network-attached prod equivalent is debuginfod). Need
      # this URL whenever the relwithdebinfo Dockerfile target is built —
      # i.e. build_docker_image in ('debug', 'both').
      memgraph_debuginfo_download_link: ${{ (matrix.build_docker_image == 'debug' || matrix.build_docker_image == 'both') && format('https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/memgraph{0}/{1}/ubuntu-24.04{2}{3}/memgraph-debuginfo_{4}-1_{5}.deb', inputs.mock && '-mock-rc' || '', needs.PrepareReleaseBranch.outputs.tag_name, matrix.malloc && '-malloc' || '', matrix.build_arch == 'arm' && '-aarch64' || '', inputs.version, matrix.build_arch == 'arm' && 'arm64' || 'amd64') || '' }}
      s3_dest_dir: "mage${{ inputs.mock && '-mock-rc' || '' }}/${{ needs.PrepareReleaseBranch.outputs.tag_name }}"
      cuda: ${{ matrix.cuda }}
      cugraph: ${{ matrix.cugraph }}
      push_to_s3: true
      malloc: ${{ matrix.malloc }}
      run_smoke_tests: ${{ !matrix.cugraph }}
      run_tests: true
      package_deb: "default"
      generate_sbom: ${{ matrix.build_arch == 'amd' && matrix.package_flavour == 'prod' && !matrix.malloc && !matrix.cuda && !matrix.cugraph }}
      build_offline_installer: ${{ matrix.build_arch == 'amd' && matrix.package_flavour == 'prod' && !matrix.malloc && !matrix.cuda && !matrix.cugraph }}
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
      version: ${{ inputs.version }}
    secrets: inherit

  SetupISSUImageOutputs:
    if: ${{ inputs.run_issu_test }}
    name: Setup ISSU Image Outputs
    # The docker images that ISSU tests previously consumed from DockerArtifact
    # are now produced by the consolidated PackageArtifact (ubuntu-24.04
    # entries with build_docker_image=both). S3 path is unchanged.
    needs: [PrepareReleaseBranch, PackageArtifact]
    runs-on: ubuntu-24.04
    outputs:
      amd_image_url: ${{ steps.set_image_urls.outputs.amd_image_url }}
      arm_image_url: ${{ steps.set_image_urls.outputs.arm_image_url }}
      last_image_version: ${{ steps.set_last_image_version.outputs.last_image_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}

      - name: Set Image URLs
        id: set_image_urls
        env:
          MOCK: "${{ inputs.mock }}"
          VERSION: "${{ inputs.version }}"
        run: |
          echo "Setting next image URLs"
          amd_image_url="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/memgraph${{ env.MOCK == 'true' && '-mock-rc' || '' }}/${{ needs.PrepareReleaseBranch.outputs.tag_name }}/docker/memgraph-${VERSION}-docker.tar.gz"
          arm_image_url="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/memgraph${{ env.MOCK == 'true' && '-mock-rc' || '' }}/${{ needs.PrepareReleaseBranch.outputs.tag_name }}/docker-aarch64/memgraph-${VERSION}-docker.tar.gz"
          echo "amd_image_url=$amd_image_url" >> $GITHUB_OUTPUT
          echo "arm_image_url=$arm_image_url" >> $GITHUB_OUTPUT
          echo "AMD Image URL: $amd_image_url"
          echo "ARM Image URL: $arm_image_url"

      - name: Set last image version
        id: set_last_image_version
        run: |
          echo "Setting last image version"
          last_image_version=$(./tools/ci/get_latest_tag.sh)
          echo "last_image_version=$last_image_version" >> $GITHUB_OUTPUT

  SetupStressImageOutputs:
    if: ${{ inputs.run_stress_tests }}
    name: Setup Stress Image Outputs
    needs: [PrepareReleaseBranch, BuildAndTestMAGE]
    runs-on: ubuntu-24.04
    outputs:
      amd_mage_image_url: ${{ steps.set_image_urls.outputs.amd_mage_image_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}

      - name: Set Image URLs
        id: set_image_urls
        env:
          MOCK: "${{ inputs.mock }}"
          VERSION: "${{ inputs.version }}"
        run: |
          echo "Setting next image URLs"
          amd_mage_image_url="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/mage${{ env.MOCK == 'true' && '-mock-rc' || '' }}/${{ needs.PrepareReleaseBranch.outputs.tag_name }}/mage-${VERSION}.tar.gz"
          echo "amd_mage_image_url=$amd_mage_image_url" >> $GITHUB_OUTPUT
          echo "AMD MAGE Image URL: $amd_mage_image_url"


  RunISSUTest:
    if: ${{ inputs.run_issu_test }}
    name: Run ISSU Tests
    needs: [SetupISSUImageOutputs, PrepareReleaseBranch]
    uses: ./.github/workflows/reusable_issu_test.yaml
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd
            next_image: ${{ needs.SetupISSUImageOutputs.outputs.amd_image_url }}
          - arch: arm
            next_image: ${{ needs.SetupISSUImageOutputs.outputs.arm_image_url }}
    with:
      last_image: ${{ needs.SetupISSUImageOutputs.outputs.last_image_version }}
      next_image: ${{ matrix.next_image }}
      arch: ${{ matrix.arch }}
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit


  StressTestsNativeStandalone:
    needs: [PrepareReleaseBranch]
    name: "Stress Tests Native Standalone"
    if: ${{ inputs.run_stress_tests }}
    uses: ./.github/workflows/reusable_stress_tests.yaml
    with:
      deployment: standalone/native
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit

  StressTestsNativeHA:
    needs: [PrepareReleaseBranch]
    name: "Stress Tests Native HA"
    if: ${{ inputs.run_stress_tests }}
    uses: ./.github/workflows/reusable_stress_tests.yaml
    with:
      deployment: ha/native
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit

  StressTestsDockerHA:
    name: "Stress Tests Docker HA"
    needs: [PrepareReleaseBranch, SetupStressImageOutputs]
    if: ${{ inputs.run_stress_tests && needs.SetupStressImageOutputs.result == 'success' }}
    uses: ./.github/workflows/reusable_stress_tests.yaml
    with:
      deployment: ha/docker
      memgraph_image: ${{ needs.SetupStressImageOutputs.outputs.amd_mage_image_url }}
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit

  StressTestsEKSHA:
    name: "Stress Tests EKS HA"
    needs: [PrepareReleaseBranch, SetupStressImageOutputs]
    if: ${{ inputs.run_stress_tests && needs.SetupStressImageOutputs.result == 'success' }}
    uses: ./.github/workflows/reusable_stress_tests.yaml
    with:
      deployment: ha/eks
      memgraph_image: ${{ needs.SetupStressImageOutputs.outputs.amd_mage_image_url }}
      workload: ../workloads/publications/workload.yaml
      ref: ${{ needs.PrepareReleaseBranch.outputs.tag_name }}
    secrets: inherit
