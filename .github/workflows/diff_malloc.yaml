name: "Diff-malloc"

on:
  workflow_call:
    inputs:
      arch:
        type: string
        description: "Target architecture (amd, arm). Default value is amd."
        default: 'amd'
      os:
        type: string
        description: "Target os. Default value is ubuntu-24.04."
        default: 'ubuntu-24.04'
      run_build:
        type: string
        description: "Should the malloc build tests be run? Default is true."
        default: 'true'
      run_id:
        type: string
        description: "The ID of the run that triggered this workflow."
        default: ''
      python_version:
        type: string
        description: "Override the Python version Memgraph is built against (e.g. 3.12). Empty uses the container's default Python."
        default: ''
      python_runtime_version:
        type: string
        description: "After building, remove the build Python and swap in this version so tests run against a different libpython. Empty disables the swap."
        default: ''
      ref:
        description: 'Branch or commit ref to run the workflow on'
        required: false
        default: ''
        type: string

env:
  ARCH: ${{ inputs.arch }}
  BUILD_TYPE: 'RelWithDebInfo'
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  OS: ${{ inputs.os }}
  PYTHON_VERSION: ${{ inputs.python_version }}
  PYTHON_RUNTIME_VERSION: ${{ inputs.python_runtime_version }}
  TOOLCHAIN: v7
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
  RUN_ID: ${{ inputs.run_id != '' && format('-{0}', inputs.run_id) || '' }}

jobs:
  build:
    if: ${{ inputs.run_build == 'true' }}
    name: "Build"
    runs-on: [self-hosted, Linux, X64, DockerMgBuild]
    timeout-minutes: 60
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Spin up mgbuild container
        run: |
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: Build release binary
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          build-memgraph --disable-jemalloc --split-debug \
          ${PYTHON_VERSION:+--python-version $PYTHON_VERSION} \
          ${PYTHON_RUNTIME_VERSION:+--python-runtime-version $PYTHON_RUNTIME_VERSION} \
          --conan-remote $CONAN_REMOTE \
          --conan-username $CONAN_USERNAME \
          --conan-password $CONAN_PASSWORD

      - name: Create enterprise DEB package
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME \
          package-memgraph

          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          copy --package --dest-dir build/output/${{ env.OS }}

      - name: Save enterprise DEB package
        if: ${{ env.RUN_ID == '' }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "Enterprise DEB package${{ env.RUN_ID }} (malloc)"
          path: build/output/${{ env.OS }}/memgraph*.deb

      - name: Stop mgbuild container
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          stop --remove

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Cancel run on merge_group failure
        if: ${{ failure() && github.event_name == 'merge_group' }}
        uses: ./.github/actions/cancel-on-failure-in-merge-queue
