name: "Diff"
concurrency:
  group: ${{ inputs.ref || github.head_ref || github.sha }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
  workflow_dispatch:
    inputs:
      community_core:
        type: boolean
        default: true
      coverage:
        description: 'Comma-separated list of coverage tests to run (e.g. core,clang_tidy). Use "none" to skip all coverage tests.'
        default: 'core,clang_tidy'
      debug_core:
        type: boolean
        default: true
      debug_integration:
        type: boolean
        default: true
      jepsen_core:
        type: boolean
        default: true
      release:
        description: 'Comma-separated list of release tests to run (e.g. core,benchmark,e2e,stress,query_modules). Use "none" to skip all release tests.'
        default: 'core,benchmark,e2e,stress,query_modules'
      malloc_build:
        type: boolean
        default: true
      mage:
        type: string
        default: 'amd,arm,cuda'
        description: 'Comma-separated list of architectures to run the mage tests on (e.g. amd,arm,cuda). Use "none" to skip all mage tests.'
      mgcxx_unit:
        type: boolean
        default: true
        description: "Run the mgcxx tests."
  workflow_call:
    inputs:
      community_core:
        type: boolean
        default: true
      coverage:
        description: 'Comma-separated list of coverage tests to run (e.g. core,clang_tidy). Use "none" to skip all coverage tests.'
        default: 'core,clang_tidy'
        type: string
      debug_core:
        type: boolean
        default: true
      debug_integration:
        type: boolean
        default: true
      jepsen_core:
        type: boolean
        default: true
      release:
        description: 'Comma-separated list of release tests to run (e.g. core,benchmark,e2e,stress,query_modules). Use "none" to skip all release tests.'
        default: 'core,benchmark,e2e,stress,query_modules'
        type: string
      malloc_build:
        type: boolean
        default: true
      mage:
        type: string
        default: 'amd,arm,cuda'
        description: 'Comma-separated list of architectures to run the mage tests on (e.g. amd,arm,cuda). Use "none" to skip all mage tests.'
      mgcxx_unit:
        type: boolean
        default: true
        description: "Run the mgcxx tests."
      ref:
        description: 'Branch or commit ref to run the workflow on'
        required: false
        default: ''
        type: string

jobs:
  DiffSetup:
    runs-on: ubuntu-latest
    outputs:
      run_community_core: ${{ steps.setup.outputs.run_community_core }}
      run_coverage_core: ${{ steps.setup.outputs.run_coverage_core }}
      run_coverage_clang_tidy: ${{ steps.setup.outputs.run_coverage_clang_tidy }}
      run_debug_core: ${{ steps.setup.outputs.run_debug_core }}
      run_debug_integration: ${{ steps.setup.outputs.run_debug_integration }}
      run_jepsen_core: ${{ steps.setup.outputs.run_jepsen_core }}
      run_release_core: ${{ steps.setup.outputs.run_release_core }}
      run_release_benchmark: ${{ steps.setup.outputs.run_release_benchmark}}
      run_release_e2e: ${{ steps.setup.outputs.run_release_e2e }}
      run_release_stress: ${{ steps.setup.outputs.run_release_stress }}
      run_release_query_modules: ${{ steps.setup.outputs.run_release_query_modules }}
      run_malloc_build: ${{ steps.setup.outputs.run_malloc_build }}
      run_mage_amd: ${{ steps.setup.outputs.run_mage_amd }}
      run_mage_arm: ${{ steps.setup.outputs.run_mage_arm }}
      run_mage_cuda: ${{ steps.setup.outputs.run_mage_cuda }}
      run_mgcxx_unit: ${{ steps.setup.outputs.run_mgcxx_unit }}
    env:
      GH_CONTEXT: ${{ toJson(github) }}
      GH_CONTEXT_FILE_NAME: github_context.json
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - name: Dump GitHub context
        run: echo "$GH_CONTEXT" >> "$GH_CONTEXT_FILE_NAME"
      - name: Set up diff execution
        id: setup
        run: ./tools/ci/diff_setup.py --gh-context-path "$GH_CONTEXT_FILE_NAME" --base-branch "origin/master"

  Community:
    needs: DiffSetup
    uses: ./.github/workflows/diff_community.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      arch: 'amd'
      os: 'ubuntu-24.04'
      run_core: ${{ needs.DiffSetup.outputs.run_community_core }}
    secrets: inherit

  Coverage:
    needs: DiffSetup
    uses: ./.github/workflows/diff_coverage.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      arch: 'amd'
      os: 'ubuntu-24.04'
      run_core: ${{ needs.DiffSetup.outputs.run_coverage_core }}
      run_clang_tidy: ${{ needs.DiffSetup.outputs.run_coverage_clang_tidy }}
    secrets: inherit

  Debug:
    needs: DiffSetup
    uses: ./.github/workflows/diff_debug.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      arch: 'amd'
      os: 'ubuntu-24.04'
      run_core: ${{ needs.DiffSetup.outputs.run_debug_core }}
      run_integration: ${{ needs.DiffSetup.outputs.run_debug_integration }}
    secrets: inherit

  Jepsen:
    needs: DiffSetup
    uses: ./.github/workflows/diff_jepsen.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      run_core: ${{ needs.DiffSetup.outputs.run_jepsen_core }}
    secrets: inherit

  Release:
    needs: DiffSetup
    uses: ./.github/workflows/diff_release.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      arch: 'amd'
      os: 'ubuntu-24.04'
      run_core: ${{ needs.DiffSetup.outputs.run_release_core }}
      run_benchmark: ${{ needs.DiffSetup.outputs.run_release_benchmark }}
      run_e2e: ${{ needs.DiffSetup.outputs.run_release_e2e }}
      run_stress: ${{ needs.DiffSetup.outputs.run_release_stress }}
      run_query_modules: ${{ needs.DiffSetup.outputs.run_release_query_modules }}
    secrets: inherit

  Malloc:
    needs: DiffSetup
    uses: ./.github/workflows/diff_malloc.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
      arch: 'amd'
      os: 'ubuntu-24.04'
      run_build: ${{ needs.DiffSetup.outputs.run_malloc_build }}
    secrets: inherit

  # Build the memgraph deb once per arch so the MAGE jobs below can wget it
  # instead of rebuilding from source. This keeps the ELF build-id of the
  # memgraph binary identical between the standalone memgraph package and the
  # binary embedded in the MAGE image, so a single debuginfod upload from the
  # memgraph build serves crashes from both. The cuda mage variant reuses the
  # amd memgraph deb — cuda only changes MAGE modules, not memgraph itself.
  # S3 prefix is run-scoped (github.run_id) so an age-based cleaner can reap
  # these temp debs without parsing PR numbers.
  MemgraphPackageAmd:
    needs: DiffSetup
    if: ${{ needs.DiffSetup.outputs.run_mage_amd == 'true' || needs.DiffSetup.outputs.run_mage_cuda == 'true' }}
    uses: ./.github/workflows/reusable_package.yaml
    with:
      os: 'ubuntu-24.04'
      arch: amd
      build_type: RelWithDebInfo
      split_debug: true
      package_flavour: prod
      push_to_s3: 'true'
      s3_bucket: deps.memgraph.io
      s3_region: eu-west-1
      s3_dest_dir: "ci-build/memgraph/run-${{ github.run_id }}"
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit

  MemgraphPackageArm:
    needs: DiffSetup
    if: ${{ needs.DiffSetup.outputs.run_mage_arm == 'true' }}
    uses: ./.github/workflows/reusable_package.yaml
    with:
      os: 'ubuntu-24.04'
      arch: arm
      build_type: RelWithDebInfo
      split_debug: true
      package_flavour: prod
      push_to_s3: 'true'
      s3_bucket: deps.memgraph.io
      s3_region: eu-west-1
      s3_dest_dir: "ci-build/memgraph/run-${{ github.run_id }}"
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit

  Mage:
    # MemgraphPackage{Amd,Arm} are skipped when their flavour isn't requested,
    # so use !cancelled() to let Mage run when only one arm/amd variant was
    # built. Per-arch jobs inside diff_mage.yml gate on inputs.run_amd/arm/cuda
    # and receive the matching URL — an empty URL falls back to from-source.
    needs: [DiffSetup, MemgraphPackageAmd, MemgraphPackageArm]
    if: ${{ !cancelled() && (needs.DiffSetup.outputs.run_mage_amd == 'true' || needs.DiffSetup.outputs.run_mage_arm == 'true' || needs.DiffSetup.outputs.run_mage_cuda == 'true') }}
    uses: ./.github/workflows/diff_mage.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
      os: 'ubuntu-24.04'
      run_amd: ${{ needs.DiffSetup.outputs.run_mage_amd == 'true' }}
      run_arm: ${{ needs.DiffSetup.outputs.run_mage_arm == 'true' }}
      run_cuda: ${{ needs.DiffSetup.outputs.run_mage_cuda == 'true' }}
      memgraph_download_link_amd: ${{ needs.MemgraphPackageAmd.outputs.package_s3_url }}
      memgraph_download_link_arm: ${{ needs.MemgraphPackageArm.outputs.package_s3_url }}
    secrets: inherit

  MGCXX:
    needs: DiffSetup
    uses: ./.github/workflows/diff_mgcxx.yml
    with:
      run_test: ${{ needs.DiffSetup.outputs.run_mgcxx_unit == 'true' }}
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit
