name: Reusable Stress Tests

on:
  workflow_call:
    inputs:
      deployment:
        description: 'Deployment type: standalone/native / ha/native / ha/docker / ha/eks'
        required: true
        type: string
      memgraph_image:
        description: 'Memgraph Docker image (repo:tag or URL to .tar.gz) - required for ha/docker and ha/eks'
        required: false
        type: string
        default: ''
      arch:
        description: 'Architecture (amd/arm)'
        required: false
        type: string
        default: 'amd'
      workload:
        description: 'Specific workload to run (path relative to deployment dir, e.g. ha/workloads/config_ssl.yaml). Runs all workloads if omitted.'
        required: false
        type: string
        default: ''
      replication_mode:
        description: 'Replication mode for data instances: sync (default) or strict_sync'
        required: false
        type: string
        default: 'sync'
      ref:
        description: 'Branch or tag to checkout'
        required: false
        type: string
        default: ''

env:
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  INPUT_IMAGE: ${{ inputs.memgraph_image }}
  WORKLOAD_PATH: ${{ inputs.workload }}
  REPLICATION_MODE: ${{ inputs.replication_mode }}
  MONITORING_HOST: ${{ secrets.MONITORING_HOST }}
  MONITORING_USERNAME: ${{ secrets.MONITORING_USERNAME }}
  MONITORING_PASSWORD: ${{ secrets.MONITORING_PASSWORD }}
  CLUSTER_ID: "${{ github.run_id }}-${{ github.job }}"
  CLUSTER_ENV: "ci-stress-tests"
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}

jobs:
  stress_test_standalone:
    name: "Stress Tests Standalone"
    if: ${{ inputs.deployment == 'standalone/native' }}
    runs-on: [self-hosted, X64, Memory256G]
    timeout-minutes: 180
    env:
      OS: ubuntu-24.04
      TOOLCHAIN: v7
      ARCH: amd
      THREADS: 24
      BUILD_TYPE: RelWithDebInfo
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Spin up mgbuild container
        run: |
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: Check core dump support
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          check-core-dumps

      - name: Build enterprise binary
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          --threads $THREADS \
          build-memgraph \
          --split-debug \
          --conan-remote ${{ secrets.CONAN_REMOTE }} \
          --conan-username ${{ secrets.CONAN_USERNAME }} \
          --conan-password ${{ secrets.CONAN_PASSWORD }}

      # TEMPORARY: validates the core-dump capture/analysis/upload/ping pipeline.
      # Crashes memgraph and exits 1, so the job jumps to "Collect core dumps".
      # Remove (or gate) before merge.
      - name: Trigger core dump (CI pipeline validation)
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          trigger-dump

      - name: Initialize tests
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          init-tests

      - name: Run stress tests (native standalone)
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME \
          --enable-monitoring \
          --monitoring-host $MONITORING_HOST \
          --cluster-id $CLUSTER_ID \
          --cluster-env $CLUSTER_ENV \
          test-memgraph stress-native-standalone

      - name: Copy stress test logs
        if: failure()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          copy --logs-dir /home/mg/memgraph/tests/stress --dest-dir build/stress/logs

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: stress-logs-native-standalone
          path: build/stress/logs/
          if-no-files-found: warn

      - name: Collect core dumps
        if: failure()
        continue-on-error: true
        run: |
          ./tools/ci/core-dumps/collect.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --run-id "${{ github.run_id }}" \
          --job-id "${{ github.job }}-${{ github.run_attempt }}"

      - name: Stop mgbuild container
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          stop --remove

      - name: Cleanup Docker
        if: always()
        run: |
          ./tools/ci/docker_cleanup.sh

  stress_test_native_ha:
    name: "Stress Tests Native HA"
    if: ${{ inputs.deployment == 'ha/native' }}
    runs-on: [self-hosted, X64, Memory256G]
    timeout-minutes: 180
    env:
      OS: ubuntu-24.04
      TOOLCHAIN: v7
      ARCH: amd
      THREADS: 24
      BUILD_TYPE: RelWithDebInfo
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Spin up mgbuild container
        run: |
          if [[ "$OS" == "ubuntu-24.04" ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: Check core dump support
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          check-core-dumps

      - name: Build enterprise binary
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          --threads $THREADS \
          build-memgraph \
          --split-debug \
          --conan-remote ${{ secrets.CONAN_REMOTE }} \
          --conan-username ${{ secrets.CONAN_USERNAME }} \
          --conan-password ${{ secrets.CONAN_PASSWORD }}

      # TEMPORARY: validates the core-dump capture/analysis/upload/ping pipeline.
      # Crashes memgraph and exits 1, so the job jumps to "Collect core dumps".
      # Remove (or gate) before merge.
      - name: Trigger core dump (CI pipeline validation)
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          trigger-dump

      - name: Initialize tests
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          init-tests

      - name: Run stress tests (native HA)
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME \
          --enable-monitoring \
          --monitoring-host $MONITORING_HOST \
          --cluster-id $CLUSTER_ID \
          --cluster-env $CLUSTER_ENV \
          --service-name stress-native-ha \
          test-memgraph stress-native-ha

      - name: Copy stress test logs
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          copy --logs-dir /home/mg/memgraph/tests/stress/stress_logs --dest-dir build/stress/logs

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: stress-logs-native-ha
          path: build/stress/logs/
          if-no-files-found: warn

      - name: Collect core dumps
        if: failure()
        continue-on-error: true
        run: |
          ./tools/ci/core-dumps/collect.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --run-id "${{ github.run_id }}" \
          --job-id "${{ github.job }}-${{ github.run_attempt }}"

      - name: Stop mgbuild container
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          stop --remove

      - name: Cleanup Docker
        if: always()
        run: |
          ./tools/ci/docker_cleanup.sh

  stress_test_docker_ha:
    name: "Stress Tests Docker HA"
    if: ${{ inputs.deployment == 'ha/docker' }}
    runs-on: [self-hosted, X64, Memory256G]
    timeout-minutes: 180
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Input Type
        if: ${{ inputs.memgraph_image != '' }}
        run: |
          read image_type image_value < <(python3 tools/ci/issu_image_type.py "$INPUT_IMAGE")
          if [[ -z "$image_type" || -z "$image_value" ]]; then
            echo "::error::Failed to determine image type from input: $INPUT_IMAGE"
            exit 1
          fi
          if [[ "$image_type" != "docker" && "$image_type" != "url" ]]; then
            echo "::error::Unknown image type '$image_type' for input: $INPUT_IMAGE (expected 'docker' or 'url')"
            exit 1
          fi
          echo "IMAGE_TYPE=${image_type}" >> $GITHUB_ENV
          echo "IMAGE_VALUE=${image_value}" >> $GITHUB_ENV

      - name: Load Image (Docker)
        if: ${{ env.IMAGE_TYPE == 'docker' }}
        run: |
          docker pull "$IMAGE_VALUE"
          echo "MEMGRAPH_IMAGE=${{ env.IMAGE_VALUE }}" >> $GITHUB_ENV

      - name: Load Image (URL)
        if: ${{ env.IMAGE_TYPE == 'url' }}
        run: |
          curl -L ${{ env.IMAGE_VALUE }} > memgraph.tar.gz
          load_output=$(docker load -i memgraph.tar.gz)

          # grab each repo:tag, drop the ":latest" one, pick the first real tag
          repo_tag=$(echo "$load_output" \
            | awk -F': ' '/Loaded image:/ {print $2}' \
            | grep -v ':latest$' \
            | head -n1)

          echo "MEMGRAPH_IMAGE=${repo_tag}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      # TEMPORARY: validates the docker-HA core-dump pipeline. Start a memgraph
      # from the image (the debug image is assumed) with the core dir bind-mounted
      # to the host so the core survives the container exit, then crash it with a
      # pathologically nested query via mgconsole (in-image). The crash must come
      # from WITHIN the process — an external SIGSEGV to PID 1 is ignored by the
      # kernel's init protection. Exits 1 so the job jumps to "Collect core dumps".
      # Remove (or gate) before merge.
      - name: Trigger core dump (CI pipeline validation)
        if: ${{ inputs.memgraph_image != '' }}
        run: |
          echo "host kernel.core_pattern: $(cat /proc/sys/kernel/core_pattern 2>/dev/null)"
          mkdir -p /tmp/mg-cores && chmod 1777 /tmp/mg-cores 2>/dev/null || true
          docker rm -f mg-core-trigger >/dev/null 2>&1 || true
          docker run -d --name mg-core-trigger \
            --ulimit core=-1 \
            -v /tmp/mg-cores:/tmp/mg-cores \
            -e MEMGRAPH_ENTERPRISE_LICENSE="$MEMGRAPH_ENTERPRISE_LICENSE" \
            -e MEMGRAPH_ORGANIZATION_NAME="$MEMGRAPH_ORGANIZATION_NAME" \
            "$MEMGRAPH_IMAGE" --telemetry-enabled=false
          # Wait for Bolt, then crash the parser (genuine in-process SIGSEGV).
          for _ in $(seq 1 30); do
            echo "RETURN 1;" | docker exec -i mg-core-trigger mgconsole >/dev/null 2>&1 && break
            sleep 1
          done
          python3 -c "n=200000; print('RETURN '+'('*n+'1'+')'*n+';')" \
            | docker exec -i mg-core-trigger mgconsole || true
          sleep 5
          echo "Cores on host:"; ls -l /tmp/mg-cores/ 2>/dev/null || true
          docker logs mg-core-trigger 2>&1 | tail -n 20 || true
          docker rm -f mg-core-trigger >/dev/null 2>&1 || true
          echo "Exiting 1 so the job proceeds to core-dump collection."
          exit 1

      - name: Run stress tests (docker HA)
        run: |
          ./release/package/mgbuild.sh \
          --enable-monitoring \
          --monitoring-host $MONITORING_HOST \
          --cluster-id $CLUSTER_ID \
          --cluster-env $CLUSTER_ENV \
          --service-name stress-docker-ha \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME \
          test-memgraph stress-docker-ha
        env:
          MEMGRAPH_IMAGE: ${{ env.MEMGRAPH_IMAGE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}

      - name: Collect core dumps
        if: failure()
        continue-on-error: true
        run: |
          # The ha/docker deployment bind-mounts /tmp/mg-cores from each memgraph
          # container, so cores land on the host and survive container teardown.
          # Analyze them in a throwaway container from the (debug) image.
          ./tools/ci/core-dumps/collect_from_image.sh \
          --host-cores-dir /tmp/mg-cores \
          --image "$MEMGRAPH_IMAGE" \
          --run-id "${{ github.run_id }}" \
          --job-id "${{ github.job }}-${{ github.run_attempt }}" \
          --upload-core true

      - name: Clean up core dumps
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/core-dumps/clean_host_cores.sh \
          --cores-dir /tmp/mg-cores \
          --image "$MEMGRAPH_IMAGE"

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: stress-logs-docker-ha
          path: tests/stress/stress_logs/
          if-no-files-found: warn

      - name: Clean up Docker
        if: always()
        run: |
          ./tools/ci/docker_cleanup.sh

  stress_test_eks_ha:
    name: "Stress Tests EKS HA"
    if: ${{ inputs.deployment == 'ha/eks' }}
    runs-on: [self-hosted, DockerMgBuild, "${{ inputs.arch == 'arm' && 'ARM64' || 'X64' }}"]
    timeout-minutes: 180
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Input Type
        if: ${{ inputs.memgraph_image != '' }}
        run: |
          read image_type image_value < <(python3 tools/ci/issu_image_type.py "$INPUT_IMAGE")
          if [[ -z "$image_type" || -z "$image_value" ]]; then
            echo "::error::Failed to determine image type from input: $INPUT_IMAGE"
            exit 1
          fi
          if [[ "$image_type" != "docker" && "$image_type" != "url" ]]; then
            echo "::error::Unknown image type '$image_type' for input: $INPUT_IMAGE (expected 'docker' or 'url')"
            exit 1
          fi
          echo "IMAGE_TYPE=${image_type}" >> $GITHUB_ENV
          echo "IMAGE_VALUE=${image_value}" >> $GITHUB_ENV

      - name: Load Image (Docker)
        if: ${{ env.IMAGE_TYPE == 'docker' }}
        run: |
          echo "MEMGRAPH_IMAGE=${{ env.IMAGE_VALUE }}" >> $GITHUB_ENV

      - name: Load Image (URL) and push to ECR
        if: ${{ env.IMAGE_TYPE == 'url' }}
        run: |
          curl -L "${{ env.IMAGE_VALUE }}" > memgraph.tar.gz
          load_output=$(docker load -i memgraph.tar.gz)

          repo_tag=$(echo "$load_output" \
            | awk -F': ' '/Loaded image:/ {print $2}' \
            | grep -v ':latest$' \
            | head -n1)

          if [[ -z "$repo_tag" ]]; then
            repo_tag=$(echo "$load_output" | awk -F': ' '/Loaded image:/ {print $2}' | head -n1)
          fi

          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          AWS_REGION="${{ secrets.EKS_AWS_REGION || 'eu-west-1' }}"
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_REPO="memgraph/stress-test"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:stress-$(date +%s)"

          aws ecr describe-repositories --repository-names "$ECR_REPO" --region "$AWS_REGION" 2>/dev/null \
            || aws ecr create-repository --repository-name "$ECR_REPO" --region "$AWS_REGION"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker tag "$repo_tag" "$ECR_IMAGE"
          docker push "$ECR_IMAGE"

          echo "MEMGRAPH_IMAGE=${ECR_IMAGE}" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EKS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EKS_AWS_SECRET_ACCESS_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install K8s tools
        run: |
          EKS_TOOLS="${{ runner.temp }}/eks-tools"
          mkdir -p "$EKS_TOOLS"

          K8S_ARCH="${{ inputs.arch == 'arm' && 'arm64' || 'amd64' }}"
          EKSCTL_ARCH="${{ inputs.arch == 'arm' && 'arm64' || 'amd64' }}"

          curl -Lo "$EKS_TOOLS/kubectl" "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/${K8S_ARCH}/kubectl"
          chmod +x "$EKS_TOOLS/kubectl"

          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | HELM_INSTALL_DIR="$EKS_TOOLS" USE_SUDO=false bash

          curl -sL "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_${EKSCTL_ARCH}.tar.gz" | tar -xz -C "$EKS_TOOLS"

          echo "$EKS_TOOLS" >> $GITHUB_PATH

      - name: Run stress tests (EKS HA)
        run: |
          ./release/package/mgbuild.sh \
          --enable-monitoring \
          --monitoring-host $MONITORING_HOST \
          --cluster-id $CLUSTER_ID \
          --cluster-env $CLUSTER_ENV \
          --service-name stress-eks-ha \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME \
          test-memgraph stress-eks-ha
        env:
          MEMGRAPH_IMAGE: ${{ env.MEMGRAPH_IMAGE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.EKS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EKS_AWS_SECRET_ACCESS_KEY }}

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: stress-logs-eks-ha
          path: tests/stress/stress_logs/
          if-no-files-found: warn

      - name: Cleanup EKS and monitoring (best effort)
        if: always()
        run: |
          ./tests/stress/ha/eks/deployment/deployment.sh destroy || true
          cd tools/ci/monitoring
          MONITORING_USE_HOST_NETWORK=true ./down.sh || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EKS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EKS_AWS_SECRET_ACCESS_KEY }}

      - name: Clean up Docker
        if: always()
        run: |
          ./tools/ci/docker_cleanup.sh
