name: "Jepsen HA Stress Tests"

on:
  workflow_call:
    inputs:
      name:
        type: string
        description: "Test name"
        required: true
      mt:
        type: boolean
        description: "Run MT test"
        required: true
      mode:
        type: string
        description: "Cluster mode (sync, sync_mixed, strict_sync, strict_sync_mixed)"
        required: true
      time-limit:
        type: string
        description: "Duration of Jepsen test (in seconds)"
        required: true
        default: "7200"
      num-tenants:
        type: string
        description: "Number of tenants used in the HA Jepsen test"
        required: true
        default: "5"
      concurrency:
        type: string
        description: "The number of worker threads. If not set, number of nodes will be used instead."
        default: ""
      storage-backup-dir-enabled:
        description: "If enabled, .old dir will be used."
        type: boolean
        default: true
      shutdown-signal:
        description: "Signal to use for terminating instances (KILL (SIGKILL), TERM (SIGTERM))"
        type: string
        default: "KILL"
      intra-cluster-tls:
        description: "If true, start each Memgraph instance with intra-cluster mTLS flags."
        type: boolean
        default: false


env:
  ARCH: 'amd'
  BUILD_TYPE: 'RelWithDebInfo'
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  MONITORING_HOST: ${{ secrets.MONITORING_HOST }}
  MONITORING_USERNAME: ${{ secrets.MONITORING_USERNAME }}
  MONITORING_PASSWORD: ${{ secrets.MONITORING_PASSWORD }}
  CLUSTER_ID: "${{ github.run_id }}-${{ github.job }}"
  CLUSTER_ENV: "ci-stress-jepsen"
  OS: 'debian-12'
  TOOLCHAIN: 'v7'
  NODES_NO: 6
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}

jobs:
  ha-test:
    name: "Run Jepsen HA Tests"
    runs-on: [self-hosted, Linux, X64, DockerMgBuild]
    timeout-minutes: 720
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Cluster File
        run: |
            case "${{ inputs.mode }}" in
              sync)
                echo "CLUSTER=sync_cluster.edn" >> $GITHUB_ENV
                ;;
              sync_mixed)
                echo "CLUSTER=sync_mixed_cluster.edn" >> $GITHUB_ENV
                ;;
              strict_sync)
                echo "CLUSTER=strict_sync_cluster.edn" >> $GITHUB_ENV
                ;;
              strict_sync_mixed)
              echo "CLUSTER=strict_sync_mixed_cluster.edn" >> $GITHUB_ENV
              ;;
              *)
                echo "Unsupported mode: ${{ inputs.mode }}"
                exit 1
                ;;
            esac

      - name: Refresh Jepsen Cluster
        run: |
          cd tests/jepsen
          ./run.sh cluster-refresh --nodes-no $NODES_NO

      - name: Spin up mgbuild container
        run: |
          ./release/package/mgbuild.sh --toolchain $TOOLCHAIN --os $OS --arch $ARCH run

      - name: Check core dump support
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          check-core-dumps

      - name: Build release binary
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            build-memgraph \
            --conan-remote $CONAN_REMOTE \
            --conan-username $CONAN_USERNAME \
            --conan-password $CONAN_PASSWORD

      - name: Copy memgraph binary
        run: |
          ./release/package/mgbuild.sh --toolchain $TOOLCHAIN --os $OS --arch $ARCH copy --binary --use-make-install --dest-dir build

      - name: Run unit tests for Jepsen code
        run: |
          cd tests/jepsen
          ./run.sh unit-tests --binary ../../build/memgraph

      - name: Start Jepsen monitoring (workload)
        if: ${{ env.MONITORING_HOST != '' }}
        run: |
          if [[ "${{ inputs.mt }}" == "true" ]]; then
            SERVICE_NAME="jepsen-ha-mt"
            COMPOSE_SUFFIX="ha-mt"
          else
            SERVICE_NAME="jepsen-hacreate"
            COMPOSE_SUFFIX="hacreate"
          fi
          COMPOSE_PROJECT_NAME="jepsen-monitoring-${{ github.run_id }}-${{ github.run_attempt }}-${COMPOSE_SUFFIX}" \
          TARGET_DOCKER_NETWORK="jepsen_jepsen" \
          MONITORING_SERVER_HOST="$MONITORING_HOST" \
          MONITORING_USERNAME="$MONITORING_USERNAME" \
          MONITORING_PASSWORD="$MONITORING_PASSWORD" \
          CLUSTER_ID="$CLUSTER_ID" \
          CLUSTER_ENV="$CLUSTER_ENV" \
          SERVICE_NAME="$SERVICE_NAME" \
          ./tools/ci/monitoring/start_jepsen_monitoring.sh

      - name: Run Jepsen workload
        env:
            INPUT_CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          cd tests/jepsen

          ./clean_old_directories.sh --nodes-no $NODES_NO > cleanup.log 2>&1 &
          CLEANUP_PID=$!
          trap "kill $CLEANUP_PID" EXIT

          if [ -z "$INPUT_CONCURRENCY" ]; then
            MIN=$NODES_NO
            MAX=10
            CONCURRENCY=$((MIN + RANDOM % (MAX - MIN + 1)))
            echo "Generated random concurrency: $CONCURRENCY (range: $MIN-$MAX)"
          else
            CONCURRENCY=$INPUT_CONCURRENCY
            echo "Using provided concurrency: $CONCURRENCY"
          fi

          if [[ "${{ inputs.mt }}" == "true" ]]; then
            NEMESIS_SLEEP_SEC=$((90 * ${{ inputs.num-tenants }}))
            ARGS="--workload ha-mt --nodes-config resources/${{ env.CLUSTER }} --time-limit ${{ inputs.time-limit }} --concurrency $CONCURRENCY --num-tenants ${{ inputs.num-tenants }} --storage-backup-dir-enabled ${{ inputs.storage-backup-dir-enabled }} --shutdown-signal ${{ inputs.shutdown-signal }} --intra-cluster-tls ${{ inputs.intra-cluster-tls }} --recovery-time 600 --nemesis-start-sleep $NEMESIS_SLEEP_SEC"
          else
            ARGS="--workload hacreate --nodes-config resources/${{ env.CLUSTER }} --time-limit ${{ inputs.time-limit }} --concurrency $CONCURRENCY --storage-backup-dir-enabled ${{ inputs.storage-backup-dir-enabled }} --shutdown-signal ${{ inputs.shutdown-signal }} --intra-cluster-tls ${{ inputs.intra-cluster-tls }} --recovery-time 600 --nemesis-start-sleep 25"
          fi

          ./run.sh test \
            --binary ../../build/memgraph \
            --run-args "$ARGS" \
            --ignore-run-stdout-logs \
            --ignore-run-stderr-logs \
            --nodes-no $NODES_NO \
            --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
            --organization-name $MEMGRAPH_ORGANIZATION_NAME \
            --intra-cluster-tls ${{ inputs.intra-cluster-tls }}

      - name: Process Jepsen results
        if: always()
        continue-on-error: true
        run: |
          cd tests/jepsen
          ./run.sh process-results

      - name: Analyze Jepsen core dumps
        if: always()
        continue-on-error: true
        run: |
          # run.sh gathered the nodes' cores into tests/jepsen/cores as
          # jepsen-n<i>_<date>_core.<...>. The mgbuild container is still up and
          # has the toolchain gdb + the matching unstripped binary, so copy the
          # cores in, produce stack traces, upload the cores + binary, and ping
          # monitoring — all into the shared ci-stack-traces/ layout.
          # CLUSTER_ID/CLUSTER_ENV and the MONITORING_* vars come from the
          # workflow-level env.
          cores_dir="tests/jepsen/cores"
          if [ ! -d "$cores_dir" ] || [ -z "$(ls -A "$cores_dir" 2>/dev/null)" ]; then
            echo "No core dumps collected — skipping analysis."
            exit 0
          fi
          container="mgbuild_${TOOLCHAIN}_${OS}"
          docker exec -u root "$container" mkdir -p /tmp/mg-cores
          docker cp "$cores_dir/." "$container":/tmp/mg-cores/
          ./tools/ci/core-dumps/collect.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --exec-user root \
          --core-glob '*core.*' \
          --upload-core true \
          --run-id "${{ github.run_id }}" \
          --job-id "${{ github.job }}-${{ github.run_attempt }}"
          rm -rf "$cores_dir"

      - name: Save Jepsen report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "Jepsen Report-${{ inputs.name }}"
          path: tests/jepsen/Jepsen.tar.gz

      - name: Refresh Jepsen Cluster
        if: always()
        continue-on-error: true
        run: |
          cd tests/jepsen
          ./run.sh cluster-refresh --nodes-no $NODES_NO

      - name: Stop Jepsen monitoring (workload)
        if: ${{ always() && env.MONITORING_HOST != '' }}
        continue-on-error: true
        run: |
          if [[ "${{ inputs.mt }}" == "true" ]]; then
            COMPOSE_SUFFIX="ha-mt"
          else
            COMPOSE_SUFFIX="hacreate"
          fi
          cd tools/ci/monitoring
          COMPOSE_PROJECT_NAME="jepsen-monitoring-${{ github.run_id }}-${{ github.run_attempt }}-${COMPOSE_SUFFIX}" \
          TARGET_DOCKER_NETWORK="jepsen_jepsen" \
          ./down.sh

      - name: Stop mgbuild container
        if: always()
        run: |
          ./release/package/mgbuild.sh --toolchain $TOOLCHAIN --os $OS --arch $ARCH stop --remove

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh
