name: "Diff-MAGE"

on:
  workflow_call:
    inputs:
      os:
        type: string
        description: "Target os. Default value is ubuntu-24.04."
        default: 'ubuntu-24.04'
      run_amd:
        type: boolean
        description: "Should the amd mage tests be run? Default is true."
        default: true
      run_arm:
        type: boolean
        description: "Should the arm mage tests be run? Default is true."
        default: true
      run_cuda:
        type: boolean
        description: "Should the cuda mage tests be run? Default is true."
        default: true
      run_id:
        type: string
        description: "The ID of the run that triggered this workflow."
        default: ''
      ref:
        description: 'Branch or commit ref to run the workflow on'
        required: false
        default: ''
        type: string

env:
  BUILD_TYPE: 'Release'
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  OS: ${{ inputs.os }}
  TOOLCHAIN: v7
  DEFAULT_MGBENCH_EXPORT_RESULTS_FILE: 'benchmark_result.json'
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
  RUN_ID: ${{ inputs.run_id != '' && format('-{0}', inputs.run_id) || '' }}

jobs:
  get-pr-number:
    name: "Get PR Number"
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.get_pr.outputs.pr_number }}
      s3_dest_dir: ${{ steps.get_dest.outputs.s3_dest_dir }}
    steps:
      - name: Resolve PR number for merge queue
        id: get_pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(echo "$MERGE_GROUP_HEAD_REF" | sed -n 's/.*pr-\([0-9]\+\).*/\1/p')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$REF_NAME" | sed -n 's/.*pr-\([0-9]\+\).*/\1/p')
          fi
          if [ "$EVENT_NAME" = "merge_group" ] && [ -z "$PR_NUMBER" ]; then
            echo "Unable to resolve PR number from merge queue refs."
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "PR Number: $PR_NUMBER"

      - name: Get S3 Destination Directory
        id: get_dest
        run: |
          PR_NUMBER=${{ steps.get_pr.outputs.pr_number }}
          if [ "$EVENT_NAME" = "merge_group" ]; then
            S3_DEST_DIR="pr-build/mage/pr${PR_NUMBER}"
          else
            S3_DEST_DIR="mage-unofficial"
          fi
          echo "s3_dest_dir=$S3_DEST_DIR" >> "$GITHUB_OUTPUT"
          echo "S3 Destination Directory: $S3_DEST_DIR"

  amd_mage_tests:
    name: "MAGE Tests (AMD)${{ inputs.run_amd && ' / Build and test MAGE' || '' }}"
    needs: get-pr-number
    if: ${{ inputs.run_amd }}
    uses: ./.github/workflows/reusable_package_mage.yaml
    with:
      arch: amd
      push_to_github: false
      push_to_s3: ${{ github.event_name == 'merge_group' }}
      s3_dest_dir: ${{ needs.get-pr-number.outputs.s3_dest_dir }}
      run_tests: true
      print_output_url: ${{ github.event_name == 'merge_group' }}
    secrets: inherit

  arm_mage_tests:
    name: "MAGE Tests (ARM)${{ inputs.run_arm && ' / Build and test MAGE' || '' }}"
    needs: get-pr-number
    if: ${{ inputs.run_arm }}
    uses: ./.github/workflows/reusable_package_mage.yaml
    with:
      arch: arm
      push_to_github: false
      push_to_s3: ${{ github.event_name == 'merge_group' }}
      s3_dest_dir: ${{ needs.get-pr-number.outputs.s3_dest_dir }}
      run_tests: true
      print_output_url: ${{ github.event_name == 'merge_group' }}
    secrets: inherit

  cuda_mage_tests:
    name: "MAGE Tests (CUDA)${{ inputs.run_cuda && ' / Build and test MAGE' || '' }}"
    needs: get-pr-number
    if: ${{ inputs.run_cuda }}
    uses: ./.github/workflows/reusable_package_mage.yaml
    with:
      arch: amd
      push_to_github: false
      push_to_s3: false
      run_tests: true
      cuda: true
    secrets: inherit
