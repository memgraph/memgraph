name: "Diff-jepsen"

on:
  workflow_call:
    inputs:
      run_core:
        type: string
        description: "Should the core jepsen build tests be run? Default is true."
        default: 'true'
      run_id:
        type: string
        description: "The ID of the run that triggered this workflow."
        default: ''
      ref:
        description: 'Branch or commit ref to run the workflow on'
        required: false
        default: ''
        type: string

env:
  ARCH: 'amd'
  BUILD_TYPE: 'RelWithDebInfo'
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  MONITORING_HOST: ${{ secrets.MONITORING_HOST }}
  MONITORING_USERNAME: ${{ secrets.MONITORING_USERNAME }}
  MONITORING_PASSWORD: ${{ secrets.MONITORING_PASSWORD }}
  OS: 'debian-12'
  TOOLCHAIN: 'v7'
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
  RUN_ID: ${{ inputs.run_id != '' && format('-{0}', inputs.run_id) || '' }}

jobs:
  core:
    if: ${{ inputs.run_core == 'true' }}
    name: "Core tests"
    runs-on: [self-hosted, Linux, X64, DockerMgBuild]
    timeout-minutes: 60
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Refresh Jepsen Cluster
        run: |
          cd tests/jepsen
          ./run.sh cluster-refresh --nodes-no 6

      - name: Spin up mgbuild container
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --no-conan-cache \
          run

      - name: Build release binary
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          build-memgraph \
          --conan-remote $CONAN_REMOTE \
          --conan-username $CONAN_USERNAME \
          --conan-password $CONAN_PASSWORD

      - name: Copy memgraph binary
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          copy --binary --use-make-install --dest-dir build

      - name: Run unit tests for Jepsen code
        run: |
          cd tests/jepsen
          ./run.sh unit-tests --binary ../../build/memgraph

      - name: Run replication bank test
        run: |
          cd tests/jepsen
          ./run.sh test \
          --binary ../../build/memgraph \
          --run-args "--workload bank --nodes-config resources/replication-config.edn --time-limit 120 --concurrency 5" \
          --ignore-run-stdout-logs \
          --ignore-run-stderr-logs \
          --nodes-no 5 \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME

      - name: Run replication large test
        run: |
          cd tests/jepsen
          ./run.sh test \
          --binary ../../build/memgraph \
          --run-args "--workload large --nodes-config resources/replication-config.edn --time-limit 60 --concurrency 5" \
          --ignore-run-stdout-logs \
          --ignore-run-stderr-logs \
          --nodes-no 5 \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME

      - name: Start Jepsen monitoring (habank)
        if: ${{ env.MONITORING_HOST != '' }}
        run: |
          JEPSEN_NODE_COUNT=6 \
          COMPOSE_PROJECT_NAME="jepsen-monitoring-${{ github.run_id }}-${{ github.run_attempt }}-habank" \
          TARGET_DOCKER_NETWORK="jepsen_jepsen" \
          MONITORING_SERVER_HOST="$MONITORING_HOST" \
          MONITORING_USERNAME="$MONITORING_USERNAME" \
          MONITORING_PASSWORD="$MONITORING_PASSWORD" \
          CLUSTER_ID="${{ github.run_id }}-${{ github.job }}" \
          CLUSTER_ENV="ci-jepsen" \
          SERVICE_NAME="jepsen-habank" \
          ./tools/ci/monitoring/start_jepsen_monitoring.sh

      - name: Run HA bank test
        run: |
          cd tests/jepsen
          ./run.sh test \
          --binary ../../build/memgraph \
          --run-args "--workload habank --nodes-config resources/sync_cluster.edn --time-limit 120 --concurrency 6" \
          --ignore-run-stdout-logs \
          --ignore-run-stderr-logs \
          --nodes-no 6 \
          --enterprise-license $MEMGRAPH_ENTERPRISE_LICENSE \
          --organization-name $MEMGRAPH_ORGANIZATION_NAME

      - name: Stop Jepsen monitoring (habank)
        if: ${{ always() && env.MONITORING_HOST != '' }}
        continue-on-error: true
        run: |
          cd tools/ci/monitoring
          COMPOSE_PROJECT_NAME="jepsen-monitoring-${{ github.run_id }}-${{ github.run_attempt }}-habank" \
          TARGET_DOCKER_NETWORK="jepsen_jepsen" \
          ./down.sh

      - name: Process Jepsen results
        continue-on-error: true
        if: always()
        run: |
          cd tests/jepsen
          ./run.sh process-results

      - name: Save Jepsen report
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: "Jepsen Report${{ env.RUN_ID }}"
          path: tests/jepsen/Jepsen.tar.gz

      - name: Stop mgbuild container
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os $OS \
          --arch $ARCH \
          --no-conan-cache \
          stop --remove

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh
