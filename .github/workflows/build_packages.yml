name: "Build and Upload MAGE Packages for a Pull Request"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        description: "PR number to use for the build (e.g., 1234)"
        required: true

run-name: "Build and Upload Packages for a Pull Request"

jobs:
  get-pr-number:
    name: "Get PR Number"
    runs-on: [self-hosted, Linux, X64, DockerMgBuild]
    outputs:
      pr_number: ${{ steps.get_pr.outputs.pr_number }}
    steps:
      - name: Set up repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Get PR Number
        id: get_pr
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "PR number is not a number"
            exit 1
          fi
          echo "Using manually provided PR number: $PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR Number: $PR_NUMBER"

  build-packages-mage:
    name: "Build ${{ matrix.arch }} Package"
    needs: get-pr-number
    uses: ./.github/workflows/reusable_package_mage.yaml
    secrets: inherit
    strategy:
      matrix:
        arch: [amd, arm]
    with:
      arch: ${{ matrix.arch }}
      build_type: RelWithDebInfo
      image_flavour: debug
      push_to_s3: true
      s3_dest_dir: pr-build/mage/pr${{ needs.get-pr-number.outputs.pr_number }}
      ref: refs/heads/master
      print_output_url: true
