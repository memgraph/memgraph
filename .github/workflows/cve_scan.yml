name: Vulnerability Scan
concurrency:
  group: cve-scan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

# The CVE scanning workflow lives in the memgraph/infra repo. This workflow
# resolves the daily-build image URLs for a given date and triggers the scan in
# infra via a `repository_dispatch` event (event_type "cve-scan"); the scan
# itself runs in infra.

on:
  workflow_call:
    inputs:
      date:
        type: string
        required: true
        description: "Daily build date (yyyymmdd) to be scanned."

  workflow_dispatch:
    inputs:
      date:
        type: string
        required: true
        description: "Daily build date (yyyymmdd) to be scanned."

run-name: CVE Scan for ${{ inputs.date }}

jobs:
  TriggerCVEScan:
    name: Trigger CVE Scan in infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Dispatch cve-scan to memgraph/infra
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_PAT }}
          CURRENT_BUILD_DATE: ${{ inputs.date }}
        run: |
          # Resolve the daily-build image URLs for this date.
          mage_arm_url="$(python3 tools/ci/cve-scan/get_cve_image_url.py 'arm64' 'mage')"
          mage_amd_url="$(python3 tools/ci/cve-scan/get_cve_image_url.py 'amd64' 'mage')"
          memgraph_arm_url="$(python3 tools/ci/cve-scan/get_cve_image_url.py 'arm64' 'memgraph')"
          memgraph_amd_url="$(python3 tools/ci/cve-scan/get_cve_image_url.py 'amd64' 'memgraph')"

          echo "MAGE arm64 URL: $mage_arm_url"
          echo "MAGE amd64 URL: $mage_amd_url"
          echo "Memgraph arm64 URL: $memgraph_arm_url"
          echo "Memgraph amd64 URL: $memgraph_amd_url"

          # Build one dispatch payload covering all four images.
          payload=$(jq -nc \
            --arg mage_arm "$mage_arm_url" \
            --arg mage_amd "$mage_amd_url" \
            --arg memgraph_arm "$memgraph_arm_url" \
            --arg memgraph_amd "$memgraph_amd_url" \
            '{event_type: "cve-scan", client_payload: {scans: [
              {arch: "arm", image_url: $mage_arm,     run_trivy: true, run_grype: true, send_slack_message: true},
              {arch: "amd", image_url: $mage_amd,     run_trivy: true, run_grype: true, send_slack_message: true},
              {arch: "arm", image_url: $memgraph_arm, run_trivy: true, run_grype: true, send_slack_message: true},
              {arch: "amd", image_url: $memgraph_amd, run_trivy: true, run_grype: true, send_slack_message: true}
            ]}}')

          echo "Dispatching cve-scan to memgraph/infra:"
          echo "$payload" | jq .

          curl --proto '=https' --tlsv1.2 -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/memgraph/infra/dispatches \
            -d "$payload"
