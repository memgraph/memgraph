name: "Reusable package mage and upload"
on:
  workflow_call:
    outputs:
      s3_package_url:
        description: "The URL of the MAGE package in S3"
        value: ${{ jobs.BuildAndPush.outputs.s3_package_url }}
    inputs:
      arch:
        type: string
        description: "Architecture to build the image for"
        required: true
      build_type:
        type: string
        description: "Mage build type"
        default: 'Release'
      build_docker_image:
        type: string
        description: "Docker image(s) to produce in this job: 'none' (default), 'prod', 'debug', or 'both'. The debug image installs memgraph-mage-debuginfo on top of the prod image, matching memgraph's split-debug pattern."
        default: 'none'
      push_to_github:
        type: boolean
        description: "Push the image, DEB and tar.gz to GitHub?"
        default: false
      push_to_s3:
        type: boolean
        description: "Push the image to S3?"
        default: false
      s3_dest_dir:
        type: string
        description: "Destination directory in S3 bucket"
        default: "mage-unofficial"
      malloc:
        type: boolean
        description: "Use malloc build of memgraph (no jemalloc)"
        default: false
      run_smoke_tests:
        type: boolean
        description: "Run smoke tests on images after building (tests against previous tagged image)"
        default: false
      upload_debug_symbols:
        type: boolean
        description: "Upload .debug sidecars to the debuginfod-layout S3 bucket."
        default: false
      ref:
        type: string
        description: "MAGE branch or tag to build"
        default: ''
      print_output_url:
        type: boolean
        description: "Print the output URL at the end of the workflow"
        default: false
      cuda:
        type: boolean
        description: "Build the image for CUDA"
        default: false
      cugraph:
        type: boolean
        description: "Build the image for CuGraph"
        default: false
      run_tests:
        type: boolean
        description: "Run tests"
        default: false
      package_mage:
        type: string
        description: "Build deb package (true|false|default)"
        # default is build only for Release/RelWithDebInfo + amd64/arm64 (other combinations are not actually different)
        default: default
      build_offline_installer:
        type: boolean
        description: "Build offline installer (.run) for Ubuntu 24.04"
        default: false
      generate_sbom:
        type: boolean
        description: "Generate SBOM"
        default: false
      memgraph_download_link:
        type: string
        description: "Memgraph package download URL"
        default: ''
      memgraph_debuginfo_download_link:
        type: string
        description: "Memgraph debuginfo (.deb sidecar) download URL. Required by the relwithdebinfo Dockerfile target when build_docker_image is 'debug' or 'both'; ignored otherwise. Set when memgraph_download_link points at a split-debug package so the MAGE debug image installs the same .debug sidecars."
        default: ''
      version:
        type: string
        description: "Version to build"
        default: ''
      daily_build:
        type: boolean
        description: "Selects the daily/master PR-style version (<tag>+pr<pr>~<commit>) instead of using release/get_version.py."
        default: false
      os:
        type: string
        description: Target distro
        default: ubuntu-24.04

run-name: "Build and test MAGE"

env:
  OS: "${{ inputs.os }}${{ inputs.arch == 'arm' && '-arm' || '' }}"
  ARCH: "${{ inputs.arch }}"
  DOCKER_REPOSITORY_NAME: memgraph/memgraph-mage
  BUILD_TYPE: "${{ inputs.build_type }}"
  # Split-debug is implicit: on for RelWithDebInfo packaging, the build type CI
  # uses. When on, the MAGE deb build also emits a memgraph-mage-debuginfo deb
  # from the .debug sidecars; when off, build-deb.sh skips that deb gracefully.
  SPLIT_DEBUG: "${{ inputs.build_type == 'RelWithDebInfo' && 'true' || 'false' }}"
  BUILD_DOCKER_IMAGE: "${{ inputs.build_docker_image }}"
  MALLOC: "${{ inputs.malloc }}"
  CUDA: "${{ inputs.cuda }}"
  CUGRAPH: "${{ inputs.cugraph }}"  # This image cannot be tested in CI, needs an Nvidia GPU
  CONTAINER_NAME: "mgbuild"
  MAGE_CONTAINER: "mage"
  MEMGRAPH_PORT: 7687
  NEO4J_PORT: 7688
  NEO4J_CONTAINER: "neo4j_test"
  MEMGRAPH_NETWORK: "memgraph_test_network"
  MYSQL_CONTAINER: "mysql_test"
  POSTGRESQL_CONTAINER: "postgresql_test"
  MEMGRAPH_ENTERPRISE_LICENSE: ${{ secrets.MEMGRAPH_ENTERPRISE_LICENSE }}
  MEMGRAPH_ORGANIZATION_NAME: ${{ secrets.MEMGRAPH_ORGANIZATION_NAME }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  MAGE_E2E_OPENAI: "1"
  GENERATE_SBOM: "${{ inputs.generate_sbom }}"
  TOOLCHAIN: "v7"
  CONAN_REMOTE: ${{ secrets.CONAN_REMOTE }}
  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
  MEMGRAPH_DOWNLOAD_LINK: ${{ inputs.memgraph_download_link }}
  MEMGRAPH_DEBUGINFO_DOWNLOAD_LINK: ${{ inputs.memgraph_debuginfo_download_link }}
  VERSION: "${{ inputs.version }}"
  DAILY_BUILD: "${{ inputs.daily_build }}"
  CI_BRANCH: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}"
  MONITORING_HOST: ${{ secrets.MONITORING_HOST }}
  MONITORING_USERNAME: ${{ secrets.MONITORING_USERNAME }}
  MONITORING_PASSWORD: ${{ secrets.MONITORING_PASSWORD }}
  CLUSTER_ID: "${{ github.run_id }}-${{ github.job }}"
  CLUSTER_ENV: "ci-mage-${{ inputs.arch }}"
  S3_DEST_DIR: "${{ inputs.s3_dest_dir }}"


jobs:
  BuildAndPush:
    name: "Build and Test MAGE"
    runs-on: [self-hosted, DockerMgBuild, Linux, "${{ inputs.arch == 'arm' && 'ARM64' || 'X64' }}"]
    timeout-minutes: 45
    outputs:
      s3_package_url: ${{ steps.output-url.outputs.s3_url }}
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: "Checkout infra repository"
        # SBOM generation uses the scripts from the memgraph/infra repo.
        if: ${{ inputs.generate_sbom }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: memgraph/infra
          path: infra
          ref: master
          token: ${{ secrets.REPO_PAT }}

      - name: Clean up Docker
        if: always()
        continue-on-error: true
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: "Log in to Docker Hub"
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull e2e Docker images in background
        if: ${{ inputs.run_tests == true && inputs.cugraph == false }}
        run: |
          ./tools/ci/pull-e2e-docker-images.sh &

      - name: Check package DEB/RPM build
        env:
          INPUT_PACKAGE_MAGE: "${{ inputs.package_mage }}"
        run: |
          if [[ "$INPUT_PACKAGE_MAGE" == "true" ]]; then
            package_mage=true
          elif [[ "$INPUT_PACKAGE_MAGE" == "false" ]]; then
            package_mage=false
          else
            if [[ "$MALLOC" == true ]]; then
              package_mage=false
            else
              package_mage=true
            fi
          fi
          if [[ "$package_mage" == true ]]; then
            echo "Building DEB/RPM package"
          else
            echo "Not building DEB/RPM package"
          fi
          echo "PACKAGE_MAGE=${package_mage}" >> $GITHUB_ENV

      - name: Check mgdeps-cache availability
        run: |
          WHEEL_PATH="${ARCH}64"
          if [[ "$CUGRAPH" == true  || "$CUDA" == true ]]; then
            echo "Using wheels build for CUDA"
            WHEEL_PATH="cuda-13.0/${WHEEL_PATH}"
          fi
          # Wheels live under a dated prefix wheels/<date>/<arch>/ (portable
          # manylinux builds). Keep WHEELS_DATE in sync with the one in
          # mage/install_python_requirements.sh.
          WHEELS_DATE="2026-06-25"
          WHEEL_PATH="${WHEELS_DATE}/${WHEEL_PATH}"
          echo "using wheel path: WHEEL_PATH=${WHEEL_PATH}"
          echo "MAGE_WHEEL_PATH=${WHEEL_PATH}" >> $GITHUB_ENV
          if curl --silent --fail "http://mgdeps-cache:8000/wheels/$WHEEL_PATH/" -o /dev/null; then
            echo "mgdeps-cache is reachable :D"
            echo "CACHE_PRESENT=true" >> $GITHUB_ENV
          else
            echo "mgdeps-cache is NOT reachable"
            echo "CACHE_PRESENT=false" >> $GITHUB_ENV
          fi

      - name: Get Memgraph version
        run: |
          # Match the MEMGRAPH_VERSION format with that used in reusable_package.yaml,
          # so MAGE artifacts are versioned like the memgraph package they bundle.
          # Daily builds use the PR-style scheme "{tag}+pr{number}~{commit}"; everything
          # else (RC/manual/diff) uses release/get_version.py.
          if [[ "$DAILY_BUILD" == "true" ]]; then
            version="$(tools/ci/get_master_package_version.sh)"
          else
            version="$(release/get_version.py --memgraph-root-dir "$(pwd)" "${VERSION#v}" '' --variant binary)"
          fi
          echo "MEMGRAPH_VERSION=${version}" >> $GITHUB_ENV

      - name: Create wheels directory and fetch wheels if available
        run: |
          mkdir -p mage/wheels/${MAGE_WHEEL_PATH}
          if [ "$CACHE_PRESENT" = "true" ]; then
            echo "Cache is present. Fetching wheels..."
            wget -nv -r -np -nH --cut-dirs=1 -P mage/wheels "http://mgdeps-cache:8000/wheels/${MAGE_WHEEL_PATH}/"#
            mv -v mage/wheels/$MAGE_WHEEL_PATH/* mage/wheels/
          else
            echo "Cache is not present. Skipping wheel fetch."
          fi

      - name: Set image tag and artifact name
        run: |
          echo "DEBUG: script inputs: MEMGRAPH_VERSION=$MEMGRAPH_VERSION, ARCH=$ARCH, BUILD_TYPE=$BUILD_TYPE, MALLOC=$MALLOC, CUDA=$CUDA, CUGRAPH=$CUGRAPH, BUILD_DOCKER_IMAGE=$BUILD_DOCKER_IMAGE"
          read PROD_IMAGE_TAG PROD_ARTIFACT_NAME < <(tools/ci/mage-artifact-name-tag.sh "$MEMGRAPH_VERSION" "$ARCH" "$BUILD_TYPE" "$MALLOC" "$CUDA" "$CUGRAPH" "prod")
          read DEBUG_IMAGE_TAG DEBUG_ARTIFACT_NAME < <(tools/ci/mage-artifact-name-tag.sh "$MEMGRAPH_VERSION" "$ARCH" "$BUILD_TYPE" "$MALLOC" "$CUDA" "$CUGRAPH" "debug")
          echo "PROD_IMAGE_TAG=${PROD_IMAGE_TAG}" >> $GITHUB_ENV
          echo "PROD_ARTIFACT_NAME=${PROD_ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "DEBUG_IMAGE_TAG=${DEBUG_IMAGE_TAG}" >> $GITHUB_ENV
          echo "DEBUG_ARTIFACT_NAME=${DEBUG_ARTIFACT_NAME}" >> $GITHUB_ENV
          case "$BUILD_DOCKER_IMAGE" in
            prod|both|none) IMAGE_TAG="$PROD_IMAGE_TAG"; ARTIFACT_NAME="$PROD_ARTIFACT_NAME" ;;
            debug)          IMAGE_TAG="$DEBUG_IMAGE_TAG"; ARTIFACT_NAME="$DEBUG_ARTIFACT_NAME" ;;
            *)              IMAGE_TAG="$PROD_IMAGE_TAG"; ARTIFACT_NAME="$PROD_ARTIFACT_NAME" ;;
          esac
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Get Current Memgraph Commit/Tag
        env:
          INPUT_REF: "${{ inputs.ref }}"
        run: |
          ./tools/ci/get_commit.sh "$INPUT_REF" "$CI_BRANCH" "$GITHUB_REF"

      - name: Download Memgraph package
        if: ${{ inputs.memgraph_download_link != '' }}
        run: |
          # rpm distros need the base package staged as mage/memgraph.rpm for the
          # centos-9 smoke image; deb distros keep mage/memgraph.deb for the
          # docker build / offline installer.
          if [[ "$OS" == ubuntu-* || "$OS" == debian-* ]]; then
            wget -O mage/memgraph.deb "$MEMGRAPH_DOWNLOAD_LINK"
          else
            wget -O mage/memgraph.rpm "$MEMGRAPH_DOWNLOAD_LINK"
          fi
          echo "Memgraph package downloaded"
          if [[ -n "$MEMGRAPH_DEBUGINFO_DOWNLOAD_LINK" ]]; then
            wget -O mage/memgraph-debuginfo.deb "$MEMGRAPH_DEBUGINFO_DOWNLOAD_LINK"
            echo "Memgraph debuginfo package downloaded"
          elif [[ "$BUILD_DOCKER_IMAGE" == "debug" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            echo "Error: build_docker_image='$BUILD_DOCKER_IMAGE' with a pre-built memgraph_download_link requires memgraph_debuginfo_download_link too (the relwithdebinfo Dockerfile target needs memgraph-debuginfo.deb)." >&2
            exit 1
          fi

      - name: "Set artifact name and dir"
        run: |
          artifact_name="$OS"
          artifact_dir='build/output'
          if [[ "$ADDITIONAL_BUILD_ARGS" == *"--disable-jemalloc"* ]]; then
            artifact_name="${artifact_name}-malloc"
          fi
          if [[ "$ARCH" == 'arm' ]]; then
            artifact_name="${artifact_name}-aarch64"
          fi
          echo "MG_ARTIFACT_NAME=$artifact_name" >> $GITHUB_ENV
          echo "MG_PACKAGE_ARTIFACT_DIR=${artifact_dir}/package" >> $GITHUB_ENV

      - name: Set Additional Build Args
        if: ${{ inputs.memgraph_download_link == '' }}
        run: |
          if [[ -z "$ADDITIONAL_BUILD_ARGS" ]]; then
            args="--disable-testing"
          else
            args="$ADDITIONAL_BUILD_ARGS --disable-testing"
          fi
          echo "ADDITIONAL_BUILD_ARGS=$args" >> $GITHUB_ENV
          echo "Final build args: $args"

      - name: "Spin up mgbuild container"
        run: |
          if [[ "$OS" =~ ^ubuntu-24.04.* ]]; then
            USE_CUSTOM_MIRROR=true
          else
            USE_CUSTOM_MIRROR=false
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          run --custom-mirror $USE_CUSTOM_MIRROR

      - name: "Build Memgraph binaries"
        if: ${{ inputs.memgraph_download_link == '' }}
        run: |
          SPLIT_DEBUG_ARG=""
          if [[ "$SPLIT_DEBUG" == "true" ]]; then
            SPLIT_DEBUG_ARG="--split-debug"
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          --cugraph $CUGRAPH \
          build-memgraph $ADDITIONAL_BUILD_ARGS $SPLIT_DEBUG_ARG \
          --conan-remote $CONAN_REMOTE \
          --conan-username $CONAN_USERNAME \
          --conan-password $CONAN_PASSWORD

      - name: "Make package"
        if: ${{ inputs.memgraph_download_link == '' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          --cugraph $CUGRAPH \
          package-memgraph

      - name: "Copy package"
        if: ${{ inputs.memgraph_download_link == '' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          copy \
          --package \
          --dest-dir $MG_PACKAGE_ARTIFACT_DIR

          # Stage the base memgraph package as mage/memgraph.deb for the
          # downstream MAGE docker build and the offline installer.
          if [[ "$OS" == ubuntu-* || "$OS" == debian-* ]]; then
            mv -v "$MG_PACKAGE_ARTIFACT_DIR"/memgraph_*.deb mage/memgraph.deb
            # Debug-flavoured docker images install memgraph-debuginfo on top
            # of the prod deb. Stage the companion sidecar deb when either
            # docker variant needs it; the relwithdebinfo Dockerfile target
            # consumes it from mage/memgraph-debuginfo.deb.
            if [[ ("$BUILD_DOCKER_IMAGE" == "debug" || "$BUILD_DOCKER_IMAGE" == "both") && "$OS" == ubuntu-24.04* ]]; then
              debuginfo_deb=$(ls -1 "$MG_PACKAGE_ARTIFACT_DIR"/memgraph-debuginfo_*.deb 2>/dev/null | head -n 1)
              if [[ -z "$debuginfo_deb" ]]; then
                echo "Error: building the relwithdebinfo MAGE docker image requires a memgraph-debuginfo deb in $MG_PACKAGE_ARTIFACT_DIR" >&2
                echo "       (memgraph must build with --split-debug — should always be true under RelWithDebInfo)" >&2
                exit 1
              fi
              mv -v "$debuginfo_deb" mage/memgraph-debuginfo.deb
            fi
          else
            # rpm distros: stage the base memgraph rpm as mage/memgraph.rpm for
            # the rpm smoke image (Dockerfile.rpm).
            base_rpm=$(ls -1 "$MG_PACKAGE_ARTIFACT_DIR"/memgraph-[0-9]*.rpm 2>/dev/null | head -n 1)
            if [[ -n "$base_rpm" ]]; then
              cp -v "$base_rpm" mage/memgraph.rpm
            fi
          fi

      - name: "Copy SBOM"
        if: ${{ env.GENERATE_SBOM == 'true' && inputs.memgraph_download_link == '' }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          copy \
          --sbom

      - name: Build Query Modules in MGBUILD container
        run: |
          SPLIT_DEBUG_ARG=""
          if [[ "$SPLIT_DEBUG" == "true" ]]; then
            SPLIT_DEBUG_ARG="--split-debug"
          fi
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --build-type $BUILD_TYPE \
          --cugraph $CUGRAPH \
          build-mage $SPLIT_DEBUG_ARG

      - name: "Build heaptrack"
        if: ${{ inputs.build_type == 'RelWithDebInfo' && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          build-heaptrack

      - name: "Copy heaptrack"
        if: ${{ inputs.build_type == 'RelWithDebInfo' && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          mkdir -p release/docker
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          copy-heaptrack \
          --dest-dir "$(pwd)/mage"

      - name: "Build OpenSSL"
        if: ${{ inputs.build_docker_image != 'none' }}
        run: |
          # This step is necessary so that we can build custom packages of OpenSSL and libssl3 for
          # the Docker images. These packages will be installed by apt, and as long as the remote
          # version provided by Ubuntu is less than our version, our package will not be overwritten.
          # This means that anything within the container that depends on OpenSSL should use our
          # version.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --cugraph $CUGRAPH \
            build-ssl \
            --version "3.5.4" \
            --conan-remote $CONAN_REMOTE \
            --conan-username $CONAN_USERNAME \
            --conan-password $CONAN_PASSWORD

          mkdir -p mage/openssl
          mv -v build/openssl*.deb mage/openssl
          mv -v build/libssl3t64*.deb mage/openssl

      - name: Build gssapi in MGBUILD container
        run: |
          # gssapi has no prebuilt linux wheels on PyPI, so build one in the
          # MGBUILD container (which has libkrb5/krb5-devel) and drop it into
          # mage/wheels so it gets copied into the image build context.
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            build-gssapi

      - name: Upload debug symbols
        if: ${{ inputs.upload_debug_symbols && env.SPLIT_DEBUG == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
        run: |
          # Stage all .debug sidecars from this job into a single dir.
          # Two sources feed staging:
          #   1. memgraph's binary + query_modules built earlier in this job
          #      (skipped when an external memgraph package was downloaded —
          #      those symbols belong to the job that produced that package);
          #   2. MAGE's own modules from mage-debug.tar.gz (mage.tar.gz is
          #      modules only after the compress-query-modules.sh split).
          # All MAGE jobs share one s3_dest_dir, so the manifest filename
          # includes ARTIFACT_NAME to avoid collisions between
          # amd/arm/cugraph/malloc jobs.
          DBG_DIR=build/debug-symbols
          mkdir -p "$DBG_DIR"

          if [[ -z "$MEMGRAPH_DOWNLOAD_LINK" ]]; then
            ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --cugraph $CUGRAPH \
            copy-debug-symbols \
            --dest-dir "$DBG_DIR"
          fi

          if [[ -f mage/mage-debug.tar.gz ]]; then
            tar -xzf mage/mage-debug.tar.gz -C "$DBG_DIR"
          fi

          manifest_url="s3://deps.memgraph.io/${S3_DEST_DIR}/debug-symbols-manifest-${ARTIFACT_NAME}.tsv"
          bash tools/ci/upload-debug-symbols.sh "$DBG_DIR" \
            --manifest-s3-url "$manifest_url"
          rm -rf "$DBG_DIR"

      - name: Build DEB package in MGBUILD container
        if: ${{ env.PACKAGE_MAGE == 'true' && (startsWith(inputs.os, 'debian-') || startsWith(inputs.os, 'ubuntu-')) }}
        run: |
          PACKAGE_ARGS="${{ inputs.malloc && '--malloc' || '' }}${{ inputs.cuda && ' --cuda' || '' }}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            package-mage-deb \
            --version $MEMGRAPH_VERSION \
            $PACKAGE_ARGS

          DEB_PACKAGE="$(ls output/memgraph-mage_*.deb | head -n 1)"
          echo "DEB_PACKAGE=${DEB_PACKAGE}" >> $GITHUB_ENV
          DEB_DEBUGINFO_PACKAGE="$(ls output/memgraph-mage-debuginfo_*.deb 2>/dev/null | head -n 1 || true)"
          echo "DEB_DEBUGINFO_PACKAGE=${DEB_DEBUGINFO_PACKAGE}" >> $GITHUB_ENV

      - name: Build RPM package in MGBUILD container
        if: ${{ env.PACKAGE_MAGE == 'true' && (startsWith(inputs.os, 'fedora-') || startsWith(inputs.os, 'centos-') || startsWith(inputs.os, 'rocky-')) }}
        run: |
          PACKAGE_ARGS="${{ inputs.malloc && '--malloc' || '' }}${{ inputs.cuda && ' --cuda' || '' }}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            package-mage-rpm \
            --version $MEMGRAPH_VERSION \
            $PACKAGE_ARGS

          # memgraph-mage-[0-9]* matches the main package; excludes the
          # memgraph-mage-debuginfo-*.rpm sidecar package.
          RPM_PACKAGE="$(ls output/memgraph-mage-[0-9]*.rpm | head -n 1)"
          echo "RPM_PACKAGE=${RPM_PACKAGE}" >> $GITHUB_ENV
          RPM_DEBUGINFO_PACKAGE="$(ls output/memgraph-mage-debuginfo-*.rpm 2>/dev/null | head -n 1 || true)"
          echo "RPM_DEBUGINFO_PACKAGE=${RPM_DEBUGINFO_PACKAGE}" >> $GITHUB_ENV

      - name: Build offline installer (.run) for Ubuntu 24.04
        if: ${{ inputs.build_offline_installer && env.PACKAGE_MAGE == 'true' && inputs.os == 'ubuntu-24.04' && inputs.arch == 'amd' }}
        run: |
          SUFFIX=""
          [[ "$MALLOC" == "true" ]]               && SUFFIX="${SUFFIX}-malloc"
          if [[ "$CUGRAPH" == "true" ]]; then
            SUFFIX="${SUFFIX}-cugraph"
          elif [[ "$CUDA" == "true" ]]; then
            SUFFIX="${SUFFIX}-cuda"
          fi
          # ARCH is "amd"/"arm" → dpkg arch "amd64"/"arm64".
          OFFLINE_RUN="output/memgraph-mage-offline-${MEMGRAPH_VERSION}-${ARCH}64${SUFFIX}.run"
          PACKAGE_ARGS=()
          [[ "$MALLOC" == "true" ]] && PACKAGE_ARGS+=(--malloc)
          [[ "$CUDA" == "true" ]]   && PACKAGE_ARGS+=(--cuda)
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            package-mage-offline-installer \
            --memgraph-deb mage/memgraph.deb \
            --mage-deb "$DEB_PACKAGE" \
            --output "$OFFLINE_RUN" \
            "${PACKAGE_ARGS[@]}"
          echo "OFFLINE_INSTALLER=${OFFLINE_RUN}" >> $GITHUB_ENV

      - name: Smoke test offline installer
        # Runs the built .run inside a fresh ubuntu:24.04 container with no
        # network access, then verifies memgraph reaches Bolt readiness using
        # tools/ci/wait_for_memgraph_bolt.sh (mgconsole is part of the
        # memgraph .deb that the installer lays down, so it's on $PATH after
        # the installer finishes). Skipped only for the cugraph variant —
        # cugraph needs an Nvidia GPU at startup, which CI runners don't
        # have. CUDA-built memgraph starts fine without a GPU.
        if: ${{ inputs.run_smoke_tests && env.OFFLINE_INSTALLER != '' && !inputs.cugraph }}
        run: |
          set -euo pipefail
          docker run --rm \
            --network none \
            -v "$PWD/${OFFLINE_INSTALLER}:/installer.run:ro" \
            -v "$PWD/tools/ci/wait_for_memgraph_bolt.sh:/wait_for_memgraph_bolt.sh:ro" \
            ubuntu:24.04 \
            bash -euxo pipefail -c '
              /installer.run
              su - memgraph -c "/usr/lib/memgraph/memgraph --also-log-to-stderr" \
                > /tmp/memgraph.log 2>&1 &
              MG_PID=$!
              trap "kill $MG_PID 2>/dev/null || true; wait $MG_PID 2>/dev/null || true" EXIT
              bash /wait_for_memgraph_bolt.sh 127.0.0.1 7687 60 1
            '

      - name: Run tests
        if: ${{ inputs.run_tests == true }}
        run: |
          TEST_ARGS="${{ inputs.cuda && ' --cuda' || '' }}${{ env.CACHE_PRESENT == 'true' && ' --cache-present' || '' }}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            test-mage unit \
            --ci \
            $TEST_ARGS

      - name: "Reuse memgraph build SBOM"
        # The memgraph package job already produced memgraph-build-sbom.json
        # (conan + MGCXX) and uploaded it as the `memgraph-sbom` artifact. When
        # this MAGE build runs in the same workflow run, reuse it instead of
        # regenerating it in-container. A standalone MAGE run has no such
        # artifact, so the download fails and the next step regenerates it.
        id: reuse_memgraph_sbom
        if: ${{ inputs.generate_sbom == true }}
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: memgraph-sbom
          path: memgraph-sbom-artifact

      - name: "Stage reused memgraph build SBOM"
        if: ${{ inputs.generate_sbom == true && steps.reuse_memgraph_sbom.outcome == 'success' }}
        run: |
          mkdir -p sbom
          cp -v memgraph-sbom-artifact/memgraph-build-sbom.json sbom/
          echo "Reusing memgraph build SBOM from the memgraph package job"

      - name: Generate SBOM
        # Regenerate the memgraph build SBOM in-container only when it could not
        # be reused from the memgraph package job (e.g. a standalone MAGE run).
        if: ${{ inputs.generate_sbom == true && steps.reuse_memgraph_sbom.outcome != 'success' }}
        env:
          CONAN_REMOTE: "${{ secrets.CONAN_REMOTE }}"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --cugraph $CUGRAPH \
            generate-memgraph-build-sbom \
            --conan-remote $CONAN_REMOTE \
            --sbom-scripts-dir "${GITHUB_WORKSPACE}/infra/infosec/sbom/memgraph"

      - name: "Stop mgbuild container"
        if: always()
        run: |
          ./release/package/mgbuild.sh \
          --toolchain $TOOLCHAIN \
          --os "$OS" \
          --arch $ARCH \
          --cugraph $CUGRAPH \
          stop --remove

      - name: "Build image (prod)"
        if: ${{ (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') && inputs.os == 'ubuntu-24.04' }}
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            package-mage-docker \
            --docker-repository-name $DOCKER_REPOSITORY_NAME \
            --image-tag $PROD_IMAGE_TAG \
            --memgraph-ref $MEMGRAPH_REF \
            --cache-present $CACHE_PRESENT \
            --custom-mirror true \
            --cuda $CUDA \
            --package-flavour prod

      - name: "Build image (debug)"
        if: ${{ (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') && inputs.os == 'ubuntu-24.04' }}
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            package-mage-docker \
            --docker-repository-name $DOCKER_REPOSITORY_NAME \
            --image-tag $DEBUG_IMAGE_TAG \
            --memgraph-ref $MEMGRAPH_REF \
            --cache-present $CACHE_PRESENT \
            --custom-mirror true \
            --cuda $CUDA \
            --package-flavour debug

      - name: "Build rpm smoke image"
        # rpm distros publish no MAGE docker image; build a throwaway local image
        # from the rpms (base memgraph + memgraph-mage) so the Docker smoke-test
        # framework can exercise the rpm install path. Never pushed. The base
        # memgraph rpm was staged to mage/memgraph.rpm by the Copy/Download step;
        # the memgraph-mage rpm comes from the Build RPM package step.
        if: ${{ inputs.run_smoke_tests && startsWith(inputs.os, 'centos') && !inputs.cugraph && !inputs.cuda }}
        run: |
          set -euo pipefail
          # Map the distro to its base image and the python version the modules
          # need. PY_VERSION empty => distro-default python3; centos-9 ships 3.9
          # but memgraph there embeds 3.12, so it needs an explicit 3.12.
          case "$OS" in
            centos-9)  base_image="quay.io/centos/centos:stream9";  py_version="3.12" ;;
            centos-10) base_image="quay.io/centos/centos:stream10"; py_version="" ;;
            *) echo "Error: no rpm smoke base-image mapping for OS '$OS'" >&2; exit 1 ;;
          esac
          if [[ ! -f mage/memgraph.rpm ]]; then
            echo "Error: mage/memgraph.rpm not staged — cannot build rpm smoke image" >&2
            exit 1
          fi
          mage_rpm="$(ls -t output/memgraph-mage-[0-9]*.rpm | head -n 1)"
          cp -v "$mage_rpm" mage/memgraph-mage.rpm
          # BuildKit required: Dockerfile.rpm uses RUN --mount=type=bind.
          DOCKER_BUILDKIT=1 docker build \
            -f mage/Dockerfile.rpm \
            --build-arg BASE_IMAGE="$base_image" \
            --build-arg PY_VERSION="$py_version" \
            -t "${DOCKER_REPOSITORY_NAME}:${PROD_IMAGE_TAG}-${OS}" \
            mage

      - name: "Bolt smoke test (prod)"
        if: ${{ !inputs.cugraph && !inputs.cuda && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          ./tools/ci/smoke_test_docker_image.sh "${DOCKER_REPOSITORY_NAME}:${PROD_IMAGE_TAG}"

      - name: "Bolt smoke test (debug)"
        if: ${{ !inputs.cugraph && !inputs.cuda && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          ./tools/ci/smoke_test_docker_image.sh "${DOCKER_REPOSITORY_NAME}:${DEBUG_IMAGE_TAG}"

      - name: Generate SBOM
        if: ${{ inputs.generate_sbom == true }}
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            generate-mage-image-sbom \
            --image-tag "$IMAGE_TAG" \
            --sbom-scripts-dir "${GITHUB_WORKSPACE}/infra/infosec/sbom/memgraph"

      - name: Upload SBOM to GitHub
        if: ${{ inputs.generate_sbom == true }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "mage-sbom"
          path: "sbom/"

      - name: Upload SBOM to S3
        if: ${{ inputs.generate_sbom == true && inputs.push_to_s3 == true && startsWith(inputs.ref, 'v') && contains(inputs.ref, '-rc') }}
        env:
          AWS_S3_BUCKET: deps.memgraph.io
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "eu-west-1"
          S3_DEST_DIR: "${{ inputs.s3_dest_dir }}/sbom/"
        run: |
          aws s3 sync sbom/ "s3://$AWS_S3_BUCKET/$S3_DEST_DIR"

      - name: "Wait for e2e Docker images to be available"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false }}
        run: |
          ./tools/ci/wait-for-docker-images.sh

      # --- debug variant tests (run FIRST) ---
      # prod and debug ship the exact same memgraph binary, but only the debug
      # image carries gdb + debug symbols, so a debug-image crash is the one we
      # can fully analyze. We run it first so a crash is caught here (and prod is
      # then skipped) rather than slipping through an un-analyzable prod run.
      # memgraph is PID 1, so a crash exits the container — it is started WITHOUT
      # --rm so the exited container (and its core) survive for collection.
      - name: "Start container for e2e tests (debug)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          docker network create $MEMGRAPH_NETWORK || true

          docker run -d \
            --network $MEMGRAPH_NETWORK \
            --name $MAGE_CONTAINER \
            --ulimit core=-1 \
            -p $MEMGRAPH_PORT:$MEMGRAPH_PORT \
            -p 7444:7444 \
            -p 9091:9091 \
            -e MEMGRAPH_ENTERPRISE_LICENSE=$MEMGRAPH_ENTERPRISE_LICENSE \
            -e MEMGRAPH_ORGANIZATION_NAME=$MEMGRAPH_ORGANIZATION_NAME \
            -e OPENAI_API_KEY=$OPENAI_API_KEY \
            ${DOCKER_REPOSITORY_NAME}:$DEBUG_IMAGE_TAG \
            --telemetry-enabled=False \
            --log-level=INFO \
            --metrics-format=OpenMetrics

          # Ensure the core dump dir exists in the container so a crashing
          # memgraph can write a core here (kernel.core_pattern points at it).
          docker exec -u root $MAGE_CONTAINER sh -c 'mkdir -p /tmp/mg-cores && chmod 1777 /tmp/mg-cores' || true

      - name: "Run end-to-end tests (debug)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e

      - name: "Run End-to-end correctness tests (debug)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          PYTHONPATH: "$PWD/tests/e2e"
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e-correctness \
            --memgraph-port $MEMGRAPH_PORT \
            --neo4j-port $NEO4J_PORT \
            --neo4j-container $NEO4J_CONTAINER \
            --mage-container $MAGE_CONTAINER \
            --memgraph-network $MEMGRAPH_NETWORK

      - name: "Run End-to-end migration tests (debug)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          PYTHONPATH: "$PWD/e2e"
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e-migration \
            --mage-container $MAGE_CONTAINER \
            --mysql-container $MYSQL_CONTAINER \
            --postgresql-container $POSTGRESQL_CONTAINER \
            --clean-env

      - name: "Collect core dumps (debug)"
        if: ${{ failure() && inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
        run: |
          ./tools/ci/core-dumps/collect_from_image.sh \
          --source-container $MAGE_CONTAINER \
          --image "${DOCKER_REPOSITORY_NAME}:${DEBUG_IMAGE_TAG}" \
          --run-id "${{ github.run_id }}" \
          --job-id "${{ github.job }}-${{ github.run_attempt }}"

      - name: "Stop container for e2e tests (debug)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') && always() }}
        run: |
          docker rm -f $MAGE_CONTAINER || true

      # --- prod variant tests (run after debug; no core collection — same binary
      # as debug, and the prod image has no gdb/symbols to analyze a core with) ---
      - name: "Start container for e2e tests (prod)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          docker network create $MEMGRAPH_NETWORK || true

          docker run -d \
            --rm \
            --network $MEMGRAPH_NETWORK \
            --name $MAGE_CONTAINER \
            -p $MEMGRAPH_PORT:$MEMGRAPH_PORT \
            -p 7444:7444 \
            -p 9091:9091 \
            -e MEMGRAPH_ENTERPRISE_LICENSE=$MEMGRAPH_ENTERPRISE_LICENSE \
            -e MEMGRAPH_ORGANIZATION_NAME=$MEMGRAPH_ORGANIZATION_NAME \
            -e OPENAI_API_KEY=$OPENAI_API_KEY \
            ${DOCKER_REPOSITORY_NAME}:$PROD_IMAGE_TAG \
            --telemetry-enabled=False \
            --log-level=INFO \
            --metrics-format=OpenMetrics

      - name: Run end-to-end tests (prod)
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --cugraph $CUGRAPH \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e

      - name: "Run End-to-end correctness tests (prod)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          PYTHONPATH: "$PWD/tests/e2e"
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e-correctness \
            --memgraph-port $MEMGRAPH_PORT \
            --neo4j-port $NEO4J_PORT \
            --neo4j-container $NEO4J_CONTAINER \
            --mage-container $MAGE_CONTAINER \
            --memgraph-network $MEMGRAPH_NETWORK

      - name: "Run End-to-end migration tests (prod)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        env:
          PYTHONPATH: "$PWD/e2e"
          TARGET_DOCKER_NETWORK: "${{ env.MEMGRAPH_NETWORK }}"
          MEMGRAPH_METRICS_TARGETS: "${{ env.MAGE_CONTAINER }}:9091"
          MEMGRAPH_LOG_WS_TARGETS: "${{ env.MAGE_CONTAINER }}:7444"
        run: |
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os "$OS" \
            --arch $ARCH \
            --build-type $BUILD_TYPE \
            --enable-monitoring \
            --monitoring-host $MONITORING_HOST \
            --cluster-id $CLUSTER_ID \
            --cluster-env $CLUSTER_ENV \
            test-mage e2e-migration \
            --mage-container $MAGE_CONTAINER \
            --mysql-container $MYSQL_CONTAINER \
            --postgresql-container $POSTGRESQL_CONTAINER \
            --clean-env

      - name: "Stop container for e2e tests (prod)"
        if: ${{ inputs.run_tests == true && inputs.cugraph == false && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') && always() }}
        run: |
          docker stop $MAGE_CONTAINER || true

      - name: Save docker image(s)
        if: ${{ (inputs.push_to_github || inputs.push_to_s3) && env.BUILD_DOCKER_IMAGE != 'none' }}
        run: |
          mkdir -p output
          # Save every image this job produced. For build_docker_image=both
          # that's two tar.gz files (prod + relwithdebinfo) keyed by their
          # respective ARTIFACT_NAMEs; for prod/debug-only it's one.
          if [[ "$BUILD_DOCKER_IMAGE" == "prod" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            docker save ${DOCKER_REPOSITORY_NAME}:$PROD_IMAGE_TAG | gzip > output/${PROD_ARTIFACT_NAME}.tar.gz
            du -h output/${PROD_ARTIFACT_NAME}.tar.gz
          fi
          if [[ "$BUILD_DOCKER_IMAGE" == "debug" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            docker save ${DOCKER_REPOSITORY_NAME}:$DEBUG_IMAGE_TAG | gzip > output/${DEBUG_ARTIFACT_NAME}.tar.gz
            du -h output/${DEBUG_ARTIFACT_NAME}.tar.gz
          fi

      - name: "Resolve previous release tag(s)"
        if: ${{ inputs.run_smoke_tests == true }}
        run: |
          last_version="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          last_version="${last_version#v}"
          suffix=""
          if [[ "$MALLOC" == "true" ]]; then
            suffix="${suffix}-malloc"
          fi
          if [[ "$CUDA" == "true" ]]; then
            suffix="${suffix}-cuda"
          fi
          echo "LAST_PROD_VERSION=${last_version}${suffix}" >> $GITHUB_ENV
          echo "LAST_DEBUG_VERSION=${last_version}-relwithdebinfo${suffix}" >> $GITHUB_ENV
          echo "Resolved LAST_PROD_VERSION=${last_version}${suffix}"
          echo "Resolved LAST_DEBUG_VERSION=${last_version}-relwithdebinfo${suffix}"

      - name: "Run Docker smoke tests (prod)"
        if: ${{ inputs.run_smoke_tests == true && (env.BUILD_DOCKER_IMAGE == 'prod' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          docker pull "${DOCKER_REPOSITORY_NAME}:${LAST_PROD_VERSION}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            test-mage smoke \
            --next-image "${DOCKER_REPOSITORY_NAME}:${PROD_IMAGE_TAG}" \
            --last-image "${DOCKER_REPOSITORY_NAME}:${LAST_PROD_VERSION}"

      - name: "Run Docker smoke tests (debug)"
        if: ${{ inputs.run_smoke_tests == true && (env.BUILD_DOCKER_IMAGE == 'debug' || env.BUILD_DOCKER_IMAGE == 'both') }}
        run: |
          docker pull "${DOCKER_REPOSITORY_NAME}:${LAST_DEBUG_VERSION}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            test-mage smoke \
            --next-image "${DOCKER_REPOSITORY_NAME}:${DEBUG_IMAGE_TAG}" \
            --last-image "${DOCKER_REPOSITORY_NAME}:${LAST_DEBUG_VERSION}"

      - name: "Run Docker smoke tests (rpm)"
        # Smoke the freshly-built rpm image (next) against the usual published
        # prod image (last) — there is no prior rpm image to diff against, so the
        # standard prod image stands in as the baseline.
        if: ${{ inputs.run_smoke_tests && startsWith(inputs.os, 'centos') && !inputs.cugraph && !inputs.cuda }}
        run: |
          docker pull "${DOCKER_REPOSITORY_NAME}:${LAST_PROD_VERSION}"
          ./release/package/mgbuild.sh \
            --toolchain $TOOLCHAIN \
            --os $OS \
            --arch $ARCH \
            test-mage smoke \
            --next-image "${DOCKER_REPOSITORY_NAME}:${PROD_IMAGE_TAG}-${OS}" \
            --last-image "${DOCKER_REPOSITORY_NAME}:${LAST_PROD_VERSION}"

      - name: Push query module archive to GitHub
        if: ${{ inputs.push_to_github }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "${{ env.ARTIFACT_NAME }}-query-modules"
          path: "mage/mage.tar.gz"

      - name: Push DEB package to GitHub
        if: ${{ inputs.push_to_github && env.PACKAGE_MAGE == 'true' && (startsWith(inputs.os, 'debian-') || startsWith(inputs.os, 'ubuntu-')) }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "${{ env.ARTIFACT_NAME }}-deb"
          path: "output/memgraph-mage*.deb"

      - name: Push RPM package to GitHub
        if: ${{ inputs.push_to_github && env.PACKAGE_MAGE == 'true' && startsWith(inputs.os, 'fedora-') || startsWith(inputs.os, 'centos-') || startsWith(inputs.os, 'rocky-') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "${{ env.ARTIFACT_NAME }}-rpm"
          path: "output/memgraph-mage*.rpm"

      - name: Push docker image to GitHub
        if: ${{ inputs.push_to_github && env.BUILD_DOCKER_IMAGE != 'none' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: "${{ env.IMAGE_TAG }}-docker"
          path: "output/mage-*.tar.gz"

      - name: Push to S3 with retry
        if: ${{ inputs.push_to_s3 }}
        env:
          AWS_S3_BUCKET: deps.memgraph.io
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "eu-west-1"
          SOURCE_DIR: "output"
          DEST_DIR: "${{ inputs.s3_dest_dir }}/"
        run: |
          max_attempts=3
          attempt_num=1
          until [ $attempt_num -gt $max_attempts ]
          do
            echo "Attempt $attempt_num..."
            # Replace the next line with your actual s3 sync command or action logic
            aws s3 sync $SOURCE_DIR s3://$AWS_S3_BUCKET/$DEST_DIR && break || {
              echo "Attempt $attempt_num failed. Retrying in 5 seconds..."
              sleep 5
              attempt_num=$((attempt_num+1))
            }
          done

      - name: Construct Output URL
        id: output-url
        if: ${{ inputs.push_to_s3 && (inputs.run_smoke_tests || inputs.print_output_url) }}
        env:
          DEST_DIR: "${{ inputs.s3_dest_dir }}"
        run: |
          base="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/$DEST_DIR"
          prod_url=""
          debug_url=""
          if [[ "$BUILD_DOCKER_IMAGE" == "prod" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            prod_url="$base/${PROD_ARTIFACT_NAME}.tar.gz"
          fi
          if [[ "$BUILD_DOCKER_IMAGE" == "debug" || "$BUILD_DOCKER_IMAGE" == "both" ]]; then
            debug_url="$base/${DEBUG_ARTIFACT_NAME}.tar.gz"
          fi
          primary_url="$base/${ARTIFACT_NAME}.tar.gz"
          echo "s3_url=$primary_url" >> $GITHUB_OUTPUT
          echo "s3_url_prod=$prod_url" >> $GITHUB_OUTPUT
          echo "s3_url_debug=$debug_url" >> $GITHUB_OUTPUT

      - name: Print Output URL
        if: ${{ inputs.print_output_url && inputs.push_to_s3 }}
        env:
          DEST_DIR: "${{ inputs.s3_dest_dir }}"
        run: |
          base="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/${DEST_DIR}"
          shopt -s nullglob
          artifacts=(output/*)
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "No artifacts in output/ to report."
            exit 0
          fi
          for f in "${artifacts[@]}"; do
            [[ -f "$f" ]] || continue
            # URL-encode the filename so unsafe chars (+, ~, etc. in daily-build
            # versions like 3.12.0+5~<commit>) resolve correctly over HTTP.
            enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$(basename "$f")")
            echo "::notice::Artifact URL: ${base}/${enc}"
          done

      - name: Memgraph Docker Cleanup
        if: always()
        run: |
          ./tools/ci/docker_cleanup.sh

      - name: Cancel run on merge_group failure
        if: ${{ failure() && github.event_name == 'merge_group' }}
        uses: ./.github/actions/cancel-on-failure-in-merge-queue
